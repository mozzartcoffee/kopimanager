<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }

            .no-print { display: none !important; }

</head>
<body class="bg-[#fcfaf7] text-stone-800 relative">

    <!-- LOGIN OVERLAY -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white p-8 rounded-[32px] shadow-xl border border-stone-100 animate-fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-100 rounded-2xl flex items-center justify-center mx-auto mb-4">

                </div>
                <h1 class="text-3xl font-black text-stone-900 tracking-tight">KopiManager<span class="text-amber-600">.</span></h1>
                <p class="text-stone-400 text-sm mt-2">Sistem Manajerial Kopi Botolan</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-4 text-stone-400 w-5 h-5"></i>
                    <input type="email" id="email" class="w-full pl-12 pr-4 py-4 bg-stone-50 border rounded-2xl outline-none focus:ring-2 focus:ring-amber-500" placeholder="Masukkan Email Anda" required>

                <div class="relative">

                <button type="submit" class="w-full bg-amber-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-amber-900 transition-all shadow-lg active:scale-95">
                    Masuk <i data-lucide="arrow-right" class="w-5 h-5"></i>

    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="hidden no-print">
        <header class="max-w-6xl mx-auto p-4 md:p-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black flex items-center gap-2 tracking-tight">
                    <i data-lucide="coffee" class="text-amber-800 w-6 h-6"></i> KopiManager<span class="text-amber-600">.</span>
                </h1>
                <p class="text-stone-400 text-sm font-medium">Laporan Laba Rugi Akurat</p>
            </div>
            <nav class="flex bg-stone-100 p-1 rounded-xl overflow-x-auto no-scrollbar max-w-full">
                <button onclick="switchTab('dashboard')" class="nav-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all" id="btn-dashboard">
                    <i data-lucide="trending-up" class="w-4 h-4"></i> Panel
                </button>
                <button onclick="switchTab('pengaturan')" class="nav-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all" id="btn-pengaturan">
                    <i data-lucide="settings" class="w-4 h-4"></i> Resep & Aset
                </button>
                <button onclick="switchTab('reseller')" class="nav-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all" id="btn-reseller">
                    <i data-lucide="users" class="w-4 h-4"></i> Reseller
                </button>
                <button onclick="switchTab('transaksi')" class="nav-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all" id="btn-transaksi">
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i> Jual
                </button>
                <button onclick="switchTab('laporan')" class="nav-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 transition-all" id="btn-laporan">
                    <i data-lucide="file-text" class="w-4 h-4"></i> Laporan
                </button>
                <button onclick="logout()" class="px-4 py-2 text-stone-400 hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </nav>
        </header>

        <main class="max-w-6xl mx-auto px-4 md:px-8 pb-12">
            <div id="tab-content"></div>
        </main>
    </div>

    <!-- AREA KHUSUS UNTUK CETAK/PRINT -->
    <div id="print-area"></div>

    <!-- MODAL CONTAINER (Pop-up Buatan) -->
    <div id="modal-container" class="no-print"></div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://wvidkpxauvadjykrksan.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2aWRrcHhhdXZhZGp5a3Jrc2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODk4ODAsImV4cCI6MjA4NzI2NTg4MH0.hhUVmvDs690jFF6osVyYBeIcaPaROtJV1tEA1QUb-GY';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- APP STATE ---
        let state = {
            isLoggedIn: false,
            activeTab: 'dashboard',
            reportFilter: 'daily',
            editingVariantId: null,
            selectedSalesChannel: 'direct', 
            selectedReportReseller: 'all', 
            ingredients: [],
            assets: [],
            opsCosts: [],
            resellers: [], 
            targetQty: 500,
            variants: [],
            sales: [],
            modal: { isOpen: false, type: 'alert', title: '', message: '', onConfirm: null }
        };

        // --- CUSTOM MODAL UI SYSTEM ---
        window.showModal = (type, title, message, onConfirm = null) => {
            state.modal = { isOpen: true, type, title, message, onConfirm };
            renderModal();
        };

        window.closeModal = () => {
            state.modal.isOpen = false;
            renderModal();
        };

        window.confirmModal = () => {
            if (state.modal.onConfirm) state.modal.onConfirm();
            closeModal();
        };

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (!state.modal.isOpen) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = `
                <div class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                    <div class="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl border border-stone-100">
                        <div class="w-12 h-12 rounded-full ${state.modal.type === 'confirm' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'} flex items-center justify-center mb-4">
                            <i data-lucide="${state.modal.type === 'confirm' ? 'alert-triangle' : 'info'}" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-xl font-black text-stone-800 mb-2">${state.modal.title}</h3>
                        <p class="text-sm text-stone-500 mb-8 leading-relaxed">${state.modal.message}</p>
                        <div class="flex justify-end gap-3">
                            ${state.modal.type === 'confirm' ? `<button onclick="closeModal()" class="px-5 py-3 rounded-xl text-stone-500 font-bold hover:bg-stone-50 transition-colors text-sm">Batal</button>` : ''}
                            <button onclick="confirmModal()" class="px-5 py-3 rounded-xl ${state.modal.type === 'confirm' ? 'bg-red-600 hover:bg-red-700' : 'bg-amber-800 hover:bg-amber-900'} text-white font-bold transition-colors text-sm shadow-md">
                                ${state.modal.type === 'confirm' ? 'Ya, Lanjutkan' : 'Tutup'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- FETCH DATA DARI SUPABASE ---
        async function loadDataFromSupabase() {
            try {
                const [ingRes, astRes, opsRes, varRes, saleRes, setRes, resellerRes] = await Promise.all([
                    supabaseClient.from('ingredients').select('*').order('id'),
                    supabaseClient.from('assets').select('*').order('id'),
                    supabaseClient.from('ops_costs').select('*').order('id'),
                    supabaseClient.from('variants').select('*').order('id'),
                    supabaseClient.from('sales').select('*').order('timestamp', { ascending: false }),
                    supabaseClient.from('settings').select('*').eq('id', 1).single(),
                    supabaseClient.from('resellers').select('*').order('id') 
                ]);

                if (ingRes.data) state.ingredients = ingRes.data;
                if (astRes.data) state.assets = astRes.data;
                if (opsRes.data) state.opsCosts = opsRes.data;
                if (saleRes.data) state.sales = saleRes.data;
                if (setRes.data) state.targetQty = setRes.data.targetQty;
                if (resellerRes.data) state.resellers = resellerRes.data;

                // Trik: Membaca bottleSize dari JSON Recipe agar tidak error Schema
                if (varRes.data) {
                    state.variants = varRes.data.map(v => {
                        let bSize = '250 ml';
                        let cleanRecipe = [];
                        if (Array.isArray(v.recipe)) {
                            const sizeObj = v.recipe.find(r => r.ingId === 'SIZE');
                            if (sizeObj) bSize = sizeObj.qty;
                            cleanRecipe = v.recipe.filter(r => r.ingId !== 'SIZE');
                        }
                        return { ...v, bottleSize: bSize, recipe: cleanRecipe };
                    });
                }
            } catch (error) {
                console.error("Gagal mengambil data dari Supabase:", error);
                showModal('alert', 'Gagal Terhubung', 'Gagal mengambil sebagian data dari database. Periksa konfigurasi Anda.');
            }
        }

        // --- CORE FUNCTIONS ---
        function formatIDR(num) {
            return "Rp " + Math.round(num).toLocaleString('id-ID');
        }

        function switchTab(tab) {
            state.activeTab = tab;
            render();
        }

        function logout() {
            state.isLoggedIn = false;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }

        // --- UTILITY GROUPING ---
        // Menggabungkan baris transaksi harian agar terlihat seperti qty meskipun di DB tersimpan satuan
        function getGroupedSales(salesArray) {
            let map = {};
            salesArray.forEach(s => {
                const key = `${s.date}_${s.name}_${s.resellerId}`;
                if(!map[key]) {
                    map[key] = { ...s, qty: 0, totalOmzet: 0, totalProfitReseller: 0, totalIngCost: 0 };
                }
                map[key].qty += 1;
                map[key].totalOmzet += s.price;
                map[key].totalProfitReseller += (s.resellerProfit || 0);
                map[key].totalIngCost += s.recordedIngredientCost;
            });
            return Object.values(map).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        }

        // --- DATA HANDLERS ---
        function getSalesChannelInfo(variantPrice) {
            let resellerId = null;
            let resellerName = 'Langsung (Kasir)';
            let resellerProfit = 0;

            if (state.selectedSalesChannel !== 'direct') {
                const r = state.resellers.find(x => x.id === parseInt(state.selectedSalesChannel));
                if (r) {
                    resellerId = r.id;
                    resellerName = `Reseller: ${r.name}`;
                    resellerProfit = variantPrice * ((r.discountRate || 0) / 100);
                }
            }
            return { resellerId, resellerName, resellerProfit };
        }

        function addSale(variantId) {
            const v = state.variants.find(x => x.id === variantId);
            const variantHPPInfo = calculateVariantMetrics(v);
            const channelInfo = getSalesChannelInfo(v.price);
            
            // Trik: Menyimpan bottleSize di dalam name agar tidak butuh modifikasi SQL Column
            const fullName = `${v.name}|${v.bottleSize || '250 ml'}`;

            const newSale = {
                id: Date.now(),
                name: fullName,
                price: v.price, 
                recordedIngredientCost: variantHPPInfo.ingredientCostOnly,
                resellerId: channelInfo.resellerId,
                resellerName: channelInfo.resellerName,
                resellerProfit: channelInfo.resellerProfit, 
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })
            };
            
            supabaseClient.from('sales').insert([newSale]).then();
            state.sales.unshift(newSale);
            render();
        }

        window.submitBulkSales = async () => {
            const dateInput = document.getElementById('bulk-date').value;
            if (!dateInput) return showModal('alert', 'Perhatian', 'Pilih tanggal terlebih dahulu.');

            const [year, month, day] = dateInput.split('-');
            const selectedDate = new Date(year, month - 1, day, 12, 0, 0); 
            const dateString = selectedDate.toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });

            let allNewSales = [];
            let totalQty = 0;

            state.variants.forEach(v => {
                const qtyInput = document.getElementById(`bulk-qty-${v.id}`).value;
                const qty = parseInt(qtyInput) || 0;
                
                if (qty > 0) {
                    const variantHPPInfo = calculateVariantMetrics(v);
                    const channelInfo = getSalesChannelInfo(v.price);
                    totalQty += qty;
                    const fullName = `${v.name}|${v.bottleSize || '250 ml'}`;
                    
                    // Membuat entri array satu per satu agar database tidak error kehilangan kolom qty
                    for(let i=0; i < qty; i++) {
                        allNewSales.push({
                            id: Date.now() + Math.floor(Math.random() * 1000000) + i,
                            name: fullName,
                            price: v.price,
                            recordedIngredientCost: variantHPPInfo.ingredientCostOnly,
                            resellerId: channelInfo.resellerId,
                            resellerName: channelInfo.resellerName,
                            resellerProfit: channelInfo.resellerProfit,
                            timestamp: selectedDate.toISOString(),
                            date: dateString
                        });
                    }
                }
            });

            if (allNewSales.length === 0) {
                return showModal('alert', 'Perhatian', 'Masukkan minimal 1 jumlah produk pada form sebelum menyimpan.');
            }

            showModal('alert', 'Memproses Data...', `Sedang menyimpan rekap sebanyak ${totalQty} botol ke dalam sistem.`);

            try {
                const { error } = await supabaseClient.from('sales').insert(allNewSales);
                if (error) throw error;

                state.sales = [...allNewSales, ...state.sales];
                state.sales.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

                render(); 

                setTimeout(() => {
                    showModal('alert', 'Rekap Tersimpan!', `Berhasil mencatat rekap penjualan sejumlah ${totalQty} produk untuk ${dateString}.`);
                }, 100);

            } catch (error) {
                console.error("Gagal simpan rekap:", error);
                showModal('alert', 'Gagal', 'Terjadi kesalahan saat mengunggah rekap data.');
            }
        };

        window.printResellerReport = () => {
            if(state.selectedReportReseller === 'all') {
                return showModal('alert', 'Perhatian', 'Pilih nama spesifik Reseller terlebih dahulu untuk dicetak.');
            }
            const r = state.resellers.find(x => x.id === parseInt(state.selectedReportReseller));
            if(!r) return;

            const rSales = state.sales.filter(s => s.resellerId === r.id);
            
            let summary = {};
            rSales.forEach(s => {
                const nameParts = s.name.split('|');
                const displayName = nameParts[0];
                const displaySize = nameParts[1] || '250 ml';
                const key = `${displayName} (${displaySize})`;
                
                if(!summary[key]) {
                    summary[key] = { qty: 0, price: s.price, rProfit: s.resellerProfit || 0 };
                }
                summary[key].qty += 1;
            });

            let totalQty = 0;
            let totalTagihan = 0;
            let totalProfit = 0;

            let tableHtml = Object.keys(summary).map(k => {
                const item = summary[k];
                totalQty += item.qty;
                const itemTotalTagihan = (item.price - item.rProfit) * item.qty; 
                const itemTotalProfit = item.rProfit * item.qty;
                totalTagihan += itemTotalTagihan;
                totalProfit += itemTotalProfit;

                return `
                <tr>
                    <td style="padding:12px 8px; border-bottom:1px solid #e5e7eb;">${k}</td>
                    <td style="padding:12px 8px; border-bottom:1px solid #e5e7eb; text-align:center; font-weight:bold;">${item.qty}</td>
                    <td style="padding:12px 8px; border-bottom:1px solid #e5e7eb; text-align:right;">${formatIDR(item.price)}</td>
                    <td style="padding:12px 8px; border-bottom:1px solid #e5e7eb; text-align:right;">${formatIDR(item.price - item.rProfit)}</td>
                    <td style="padding:12px 8px; border-bottom:1px solid #e5e7eb; text-align:right; font-weight:bold;">${formatIDR(itemTotalTagihan)}</td>
                    <td style="padding:12px 8px; border-bottom:1px solid #e5e7eb; text-align:right; color:#15803d; font-weight:bold;">${formatIDR(itemTotalProfit)}</td>
                </tr>`;
            }).join('');

            const html = `
                <div style="font-family: 'Plus Jakarta Sans', sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; color: #1c1917;">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h1 style="margin: 0; font-size: 24px; font-weight: 900; color:#92400e;">INVOICE & LAPORAN RESELLER</h1>
                        <p style="margin: 4px 0 0; color: #78716c; font-size: 14px;">Sistem KopiManager Pro</p>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; background: #fafaf9; padding: 20px; border-radius: 16px; border: 1px solid #f5f5f4;">
                        <div>
                            <p style="margin:0; font-size: 10px; color:#a8a29e; text-transform:uppercase; letter-spacing:1px; font-weight:bold;">Mitra Reseller</p>
                            <h3 style="margin:4px 0; font-size: 18px; font-weight: 900;">${r.name}</h3>
                            <p style="margin:0; color: #57534e; font-size: 14px;">WA: ${r.phone || '-'}</p>
                        </div>
                        <div style="text-align: right;">
                            <p style="margin:0; font-size: 10px; color:#a8a29e; text-transform:uppercase; letter-spacing:1px; font-weight:bold;">Tanggal Cetak</p>
                            <h3 style="margin:4px 0; font-size: 16px; font-weight: 700;">${new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'})}</h3>
                            <p style="margin:0; font-size: 14px; color:#b45309; font-weight:bold;">Diskon: ${r.discountRate}%</p>
                        </div>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 14px;">
                        <thead>
                            <tr style="background-color: #f5f5f4; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; color:#78716c;">
                                <th style="padding:12px 8px; text-align:left; border-bottom:2px solid #e5e7eb;">Produk & Ukuran</th>
                                <th style="padding:12px 8px; text-align:center; border-bottom:2px solid #e5e7eb;">Qty</th>
                                <th style="padding:12px 8px; text-align:right; border-bottom:2px solid #e5e7eb;">Hrg. Normal</th>
                                <th style="padding:12px 8px; text-align:right; border-bottom:2px solid #e5e7eb;">Hrg. Reseller</th>
                                <th style="padding:12px 8px; text-align:right; border-bottom:2px solid #e5e7eb;">Sub Total (Tagihan)</th>
                                <th style="padding:12px 8px; text-align:right; border-bottom:2px solid #e5e7eb;">Profit Reseller</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableHtml}
                            ${rSales.length === 0 ? '<tr><td colspan="6" style="text-align:center; padding: 40px; color:#a8a29e; font-weight:bold;">Belum ada riwayat transaksi untuk dicetak.</td></tr>' : ''}
                        </tbody>
                    </table>

                    <div style="display: flex; justify-content: flex-end; width: 100%;">
                        <div style="width: 350px; padding: 20px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 16px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: #78716c;">
                                <span>Total Botol Terjual:</span>
                                <strong>${totalQty} Botol</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 14px; color: #15803d;">
                                <span>Total Profit Reseller:</span>
                                <strong>+ ${formatIDR(totalProfit)}</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; border-top: 2px dashed #fcd34d; padding-top: 16px; font-size: 18px; color:#92400e;">
                                <span>TOTAL SETORAN:</span>
                                <strong style="font-weight:900;">${formatIDR(totalTagihan)}</strong>
                            </div>
                        </div>
                    </div>
                    
                    <p style="text-align:center; margin-top: 60px; font-size: 12px; color: #a8a29e; font-weight:500;">
                        Terima kasih atas kerja sama Anda yang luar biasa!
                    </p>
                </div>
            `;

            document.getElementById('print-area').innerHTML = html;
            window.print();
            setTimeout(() => { document.getElementById('print-area').innerHTML = ''; }, 1000);
        }

        // --- CALCULATIONS ---
        function calculateMonthlyAssetDepreciation() {
            return state.assets.reduce((acc, curr) => acc + (curr.cost / (curr.lifeYears * 12)), 0);
        }

        function calculateTotalMonthlyOverhead() {
            return state.opsCosts.reduce((acc, curr) => acc + curr.monthly, 0);
        }

        function calculateVariantMetrics(variant) {
            let ingredientCostOnly = 0;
            variant.recipe.forEach(r => {
                const ing = state.ingredients.find(i => i.id === r.ingId);
                if (ing) {
                    ingredientCostOnly += (ing.cost / ing.bulkAmount) * r.qty;
                }
            });

            const monthlyDepreciation = calculateMonthlyAssetDepreciation();
            const monthlyOverhead = calculateTotalMonthlyOverhead();
            const totalMonthlyFixedCosts = monthlyDepreciation + monthlyOverhead;
            const fixedCostPerUnit = totalMonthlyFixedCosts / state.targetQty;
            
            let maxCanProduce = Infinity;
            if (variant.recipe.length === 0) maxCanProduce = 0;
            variant.recipe.forEach(r => {
                const ing = state.ingredients.find(i => i.id === r.ingId);
                if (ing && r.qty > 0) {
                    const possible = Math.floor(ing.bulkAmount / r.qty);
                    if (possible < maxCanProduce) maxCanProduce = possible;
                }
            });

            return {
                ingredientCostOnly,
                depreciationPerUnit: monthlyDepreciation / state.targetQty,
                overheadPerUnit: monthlyOverhead / state.targetQty,
                totalHpp: ingredientCostOnly + fixedCostPerUnit,
                maxCanProduce: maxCanProduce === Infinity ? 0 : maxCanProduce
            };
        }

        function calculateBEPMetrics() {
            const monthlyOverhead = calculateTotalMonthlyOverhead();
            const monthlyDepreciation = calculateMonthlyAssetDepreciation();
            const totalFixedCosts = monthlyOverhead + monthlyDepreciation;

            if (state.variants.length === 0) return { bepUnits: 0, avgMargin: 0, fixedCosts: totalFixedCosts };

            let totalMargin = 0;
            state.variants.forEach(v => {
                let ingredientCost = 0;
                v.recipe.forEach(r => {
                    const ing = state.ingredients.find(i => i.id === r.ingId);
                    if (ing) ingredientCost += (ing.cost / ing.bulkAmount) * r.qty;
                });
                totalMargin += (v.price - ingredientCost);
            });

            const avgMargin = totalMargin / state.variants.length;
            const bepUnits = avgMargin > 0 ? Math.ceil(totalFixedCosts / avgMargin) : Infinity;

            return { bepUnits, avgMargin, fixedCosts: totalFixedCosts };
        }

        function renderLaporan(el) {
            const now = new Date();
            const reportData = state.sales.filter(sale => {
                const saleDate = new Date(sale.timestamp);
                if (state.reportFilter === 'daily') return saleDate.toDateString() === now.toDateString();
                if (state.reportFilter === 'weekly') return (now - saleDate) / (1000 * 60 * 60 * 24) <= 7;
                if (state.reportFilter === 'monthly') return saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();
                return true;
            });

            const monthlyOverhead = calculateTotalMonthlyOverhead();
            const monthlyDepreciation = calculateMonthlyAssetDepreciation();
            
            let divisor = 1;
            if (state.reportFilter === 'daily') divisor = 30;
            if (state.reportFilter === 'weekly') divisor = 4.28;

            const allocatedOverhead = monthlyOverhead / divisor;
            const allocatedDepreciation = monthlyDepreciation / divisor;

            const revenue = reportData.reduce((a, b) => a + (b.price - (b.resellerProfit || 0)), 0);
            const ingredientCosts = reportData.reduce((a, b) => a + b.recordedIngredientCost, 0);
            const netProfit = revenue - ingredientCosts - allocatedOverhead - allocatedDepreciation;
            const totalUnitsSold = reportData.length;

            const bepMetrics = calculateBEPMetrics();
            let bepTarget = bepMetrics.bepUnits;
            if (state.reportFilter === 'daily') bepTarget = Math.ceil(bepMetrics.bepUnits / 30);
            if (state.reportFilter === 'weekly') bepTarget = Math.ceil(bepMetrics.bepUnits / 4.28);
            const isBepReached = totalUnitsSold >= bepTarget;

            const groupedReportData = getGroupedSales(reportData);

            el.innerHTML = `

                    <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">

                        <div class="flex bg-stone-100 p-1 rounded-xl">
                            <button onclick="state.reportFilter='daily'; render();" class="px-4 py-2 rounded-lg text-xs font-bold ${state.reportFilter==='daily'?'bg-white text-amber-800 shadow-sm':'text-stone-400'}">Hari Ini</button>
                            <button onclick="state.reportFilter='weekly'; render();" class="px-4 py-2 rounded-lg text-xs font-bold ${state.reportFilter==='weekly'?'bg-white text-amber-800 shadow-sm':'text-stone-400'}">Mingguan</button>
                            <button onclick="state.reportFilter='monthly'; render();" class="px-4 py-2 rounded-lg text-xs font-bold ${state.reportFilter==='monthly'?'bg-white text-amber-800 shadow-sm':'text-stone-400'}">Bulanan</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                            <p class="text-stone-400 text-[10px] font-black uppercase tracking-widest mb-1">Omzet Bersih</p>
                            <h4 class="text-lg font-black">${formatIDR(revenue)}</h4>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                            <p class="text-stone-400 text-[10px] font-black uppercase tracking-widest mb-1">Bahan Baku</p>
                            <h4 class="text-lg font-black text-stone-500">${formatIDR(ingredientCosts)}</h4>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                            <p class="text-stone-400 text-[10px] font-black uppercase tracking-widest mb-1">Overhead</p>
                            <h4 class="text-lg font-black text-red-400">${formatIDR(allocatedOverhead)}</h4>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                            <p class="text-stone-400 text-[10px] font-black uppercase tracking-widest mb-1">Depresiasi</p>

                        </div>
                        <div class="p-6 rounded-3xl border shadow-sm ${netProfit >= 0 ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}">
                            <p class="${netProfit >= 0 ? 'text-green-600' : 'text-red-600'} text-[10px] font-black uppercase tracking-widest mb-1">Laba Bersih</p>
                            <h4 class="text-xl font-black ${netProfit >= 0 ? 'text-green-700' : 'text-red-700'}">${netProfit < 0 ? '-' : ''}${formatIDR(Math.abs(netProfit))}</h4>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm flex flex-col gap-3">
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-stone-400 text-[10px] font-black uppercase tracking-widest mb-1">Status Balik Modal (BEP) - ${state.reportFilter === 'daily' ? 'Harian' : state.reportFilter === 'weekly' ? 'Mingguan' : 'Bulanan'}</p>
                                <h4 class="text-lg font-black ${isBepReached ? 'text-green-600' : 'text-indigo-600'}">${totalUnitsSold} / ${bepTarget} Botol Terjual</h4>
                            </div>
                            <span class="text-xs font-bold px-3 py-1 rounded-full ${isBepReached ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${isBepReached ? 'Balik Modal Tercapai \u2713' : 'Belum Balik Modal'}</span>
                        </div>
                        <div class="w-full bg-stone-100 rounded-full h-3 overflow-hidden">
                            <div class="h-3 rounded-full transition-all duration-500 ${isBepReached ? 'bg-green-500' : 'bg-indigo-500'}" style="width: ${Math.min((totalUnitsSold / (bepTarget || 1)) * 100, 100)}%"></div>
                        </div>
                        <p class="text-[10px] text-stone-400 mt-1">Dihitung berdasarkan rata-rata margin untuk menutupi seluruh biaya operasional & penyusutan aset periode ini.</p>
                    </div>

                    ${netProfit < 0 ? `
                        <div class="bg-amber-50 border border-amber-200 p-4 rounded-2xl flex items-center gap-3">
                            <i data-lucide="alert-triangle" class="text-amber-600"></i>
                            <p class="text-xs text-amber-800"><b>Rugi Terdeteksi:</b> Penjualan belum cukup untuk menutup biaya operasional Anda.</p>
                        </div>
                    ` : ''}

                    <div class="bg-white rounded-[32px] border border-stone-100 shadow-sm overflow-hidden">
                        <div class="p-6 border-b border-stone-50 font-black">Detail Transaksi</div>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-stone-50 text-[10px] font-black uppercase text-stone-400 tracking-widest">
                                <tr>
                                    <th class="px-6 py-4">Hari & Tanggal</th>
                                    <th class="px-6 py-4">Sumber Penjualan</th>
                                    <th class="px-6 py-4">Varian & Ukuran</th>
                                    <th class="px-6 py-4 text-center">Jumlah (Qty)</th>
                                    <th class="px-6 py-4 text-right">Laba Kotor (Owner)</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-stone-50">
                                ${groupedReportData.map(s => {
                                    const actualRevenue = s.totalOmzet - s.totalProfitReseller;
                                    const grossProfit = actualRevenue - s.totalIngCost;
                                    const isReseller = s.resellerId != null;
                                    const nameParts = s.name.split('|');
                                    const displayName = nameParts[0];
                                    const displaySize = nameParts[1] || '';

                                    return `
                                    <tr class="hover:bg-stone-50/50 transition-colors">
                                        <td class="px-6 py-4 text-stone-500 text-xs">${s.date}</td>
                                        <td class="px-6 py-4 font-bold text-xs ${isReseller ? 'text-amber-600' : 'text-stone-500'}">${isReseller ? s.resellerName : 'Milik Sendiri'}</td>
                                        <td class="px-6 py-4">
                                            <div class="font-black">${displayName}</div>
                                            ${displaySize ? `<div class="text-[10px] font-bold text-stone-400">${displaySize}</div>` : ''}
                                        </td>
                                        <td class="px-6 py-4 text-center font-black">${s.qty}</td>
                                        <td class="px-6 py-4 text-right font-black text-green-600">${formatIDR(grossProfit)}</td>
                                    </tr>
                                `}).join('')}
                                ${groupedReportData.length === 0 ? '<tr><td colspan="5" class="px-6 py-10 text-center text-stone-400 italic font-bold">Belum ada data untuk periode ini</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderPengaturan(el) {
            const currentVariant = state.variants.find(v => v.id === state.editingVariantId);
            
            el.innerHTML = `
                <div class="space-y-8 animate-fade-in">
                    <!-- 1. GUDANG -->
                    <section class="bg-white p-8 rounded-[32px] border border-stone-100 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <div><h3 class="text-xl font-black flex items-center gap-2"><i data-lucide="database" class="text-amber-600"></i> 1. Gudang Bahan Baku (Mingguan)</h3><p class="text-xs text-stone-400">Total budget belanja dan jumlah stok bahan baku yang Anda siapkan untuk 1 minggu</p></div>
                            <button onclick="addIngredient()" class="bg-stone-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-stone-800">+ Tambah</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${state.ingredients.map(ing => `
                                <div class="p-4 bg-stone-50 rounded-2xl border border-stone-100 flex flex-col gap-3 relative hover:border-amber-300 transition-colors">
                                    <div class="flex justify-between items-center">
                                        <input id="ing-name-${ing.id}" class="bg-transparent font-black text-sm w-full outline-none text-stone-800 placeholder-stone-300" value="${ing.name}" onchange="updateIng(${ing.id}, 'name', this.value)" placeholder="Nama Bahan Baku">
                                        <button onclick="delIng(${ing.id})" class="text-stone-300 hover:text-red-500 ml-2 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                    <div class="grid grid-cols-2 gap-3">
                                        <div class="flex flex-col gap-1">
                                            <label class="text-[8px] font-black text-stone-400 uppercase tracking-widest">Belanja 1 Minggu</label>
                                            <div class="flex items-center gap-1 bg-white px-2 py-1.5 rounded-lg border border-stone-200 focus-within:border-amber-400 transition-colors">
                                                <span class="text-[10px] text-stone-400 font-bold">Rp</span>
                                                <input id="ing-cost-${ing.id}" class="w-full text-xs font-bold outline-none" type="number" value="${ing.cost}" onchange="updateIng(${ing.id}, 'cost', parseFloat(this.value))">
                                            </div>
                                        </div>
                                        <div class="flex flex-col gap-1">
                                            <label class="text-[8px] font-black text-stone-400 uppercase tracking-widest">Stok 1 Minggu</label>
                                            <div class="flex items-center gap-1 bg-white px-2 py-1.5 rounded-lg border border-stone-200 focus-within:border-amber-400 transition-colors">
                                                <input id="ing-bulk-${ing.id}" class="w-full text-xs font-bold outline-none text-right" type="number" value="${ing.bulkAmount}" onchange="updateIng(${ing.id}, 'bulkAmount', parseFloat(this.value))">
                                                <select id="ing-unit-${ing.id}" class="text-[10px] bg-transparent font-bold outline-none border-l pl-1 text-amber-700" onchange="updateIng(${ing.id}, 'unit', this.value)">
                                                    <option value="g" ${ing.unit === 'g' ? 'selected' : ''}>g</option>
                                                    <option value="ml" ${ing.unit === 'ml' ? 'selected' : ''}>ml</option>
                                                    <option value="pcs" ${ing.unit === 'pcs' ? 'selected' : ''}>pcs</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="pt-2 border-t border-stone-200 flex justify-between items-center">
                                        <span class="text-[10px] text-stone-400 font-medium">Harga per satuan:</span>
                                        <span class="text-[10px] font-black text-amber-700">Rp ${Math.round(ing.cost / (ing.bulkAmount || 1)).toLocaleString('id-ID')} / ${ing.unit}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>

                    <!-- 2. ASET TETAP -->
                    <section class="bg-white p-8 rounded-[32px] border border-stone-100 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <div><h3 class="text-xl font-black flex items-center gap-2"><i data-lucide="package" class="text-amber-600"></i> 2. Aset Tetap & Peralatan</h3><p class="text-xs text-stone-400">Peralatan jangka panjang (Biaya penyusutan dihitung otomatis)</p></div>
                            <button onclick="addAsset()" class="bg-stone-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-stone-800">+ Tambah Aset</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${state.assets.map(asset => `
                                <div class="p-4 bg-stone-50 rounded-2xl border border-stone-100 space-y-3">
                                    <div class="flex justify-between">
                                        <input id="ast-name-${asset.id}" class="bg-transparent font-bold text-sm outline-none w-full" value="${asset.name}" onchange="updateAsset(${asset.id}, 'name', this.value)">
                                        <button onclick="delAsset(${asset.id})" class="text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div>
                                            <label class="text-[8px] font-black text-stone-400">HARGA BELI</label>
                                            <input id="ast-cost-${asset.id}" class="w-full bg-white p-1 rounded border text-xs font-bold outline-none" type="number" value="${asset.cost}" onchange="updateAsset(${asset.id}, 'cost', parseFloat(this.value))">
                                        </div>
                                        <div>
                                            <label class="text-[8px] font-black text-stone-400">MASA PAKAI (THN)</label>
                                            <input id="ast-life-${asset.id}" class="w-full bg-white p-1 rounded border text-xs font-bold outline-none" type="number" value="${asset.lifeYears}" onchange="updateAsset(${asset.id}, 'lifeYears', parseFloat(this.value))">
                                        </div>
                                    </div>
                                    <div class="pt-2 border-t flex justify-between">
                                        <span class="text-[10px] text-stone-400">Penyusutan/Bulan:</span>
                                        <span class="text-[10px] font-bold text-amber-700">${formatIDR(asset.cost / (asset.lifeYears * 12))}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>

                    <!-- 3. TARGET & OVERHEAD -->
                    <section class="bg-white p-8 rounded-[32px] border border-stone-100 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <div><h3 class="text-xl font-black flex items-center gap-2 text-stone-800"><i data-lucide="target" class="text-amber-600"></i> 3. Target & Biaya Overhead</h3><p class="text-xs text-stone-400">Biaya operasional tetap bulanan</p></div>
                        </div>
                        <div class="grid md:grid-cols-3 gap-6">
                            <div class="bg-amber-50 p-6 rounded-2xl border border-amber-100">
                                <label class="text-[10px] font-black text-amber-800 uppercase tracking-widest block mb-2">Target Produksi (btl/bln)</label>
                                <input id="target-qty" type="number" class="w-full bg-white p-3 rounded-xl border border-amber-200 text-2xl font-black text-amber-900 outline-none" value="${state.targetQty}" onchange="updateTargetQty(this.value)">
                            </div>
                            <div class="md:col-span-2 space-y-3">
                                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest block mb-1">Rincian Overhead (Sewa, Gaji, dsb)</label>
                                ${state.opsCosts.map(ops => `
                                    <div class="flex gap-2">
                                        <input id="ops-name-${ops.id}" class="flex-1 p-3 bg-stone-50 border rounded-xl text-xs font-bold outline-none" value="${ops.name}" onchange="updateOpsCost(${ops.id}, 'name', this.value)">
                                        <div class="relative w-32">
                                            <span class="absolute left-3 top-3 text-[10px] text-stone-400">Rp</span>
                                            <input id="ops-monthly-${ops.id}" type="number" class="w-full pl-8 pr-3 py-3 bg-stone-50 border rounded-xl text-xs font-black outline-none" value="${ops.monthly}" onchange="updateOpsCost(${ops.id}, 'monthly', parseFloat(this.value))">
                                        </div>
                                        <button onclick="delOps(${ops.id})" class="p-2 text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                `).join('')}
                                <button onclick="addOps()" class="text-xs font-bold text-amber-700 flex items-center gap-1 mt-2">+ Tambah Overhead</button>
                            </div>
                        </div>
                    </section>

                    <!-- 4. RESEP -->
                    <div class="grid md:grid-cols-12 gap-8">
                        <div class="md:col-span-4">
                            <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                                <h3 class="font-black mb-4 flex items-center gap-2"><i data-lucide="layers" class="text-amber-600 w-5 h-5"></i> 4. Varian Produk</h3>
                                <div class="space-y-2">
                                    ${state.variants.map(v => `
                                        <button onclick="state.editingVariantId=${v.id}; render();" class="w-full flex justify-between items-center p-4 rounded-2xl border ${state.editingVariantId===v.id?'border-amber-600 bg-amber-50':'border-stone-50'}">
                                            <div class="flex flex-col text-left">
                                                <span class="font-bold text-sm text-stone-800">${v.name}</span>
                                                <span class="text-[10px] font-bold text-stone-400 mt-1">${v.bottleSize || '250 ml'}</span>
                                            </div>
                                            <i data-lucide="chevron-right" class="w-4 h-4 ${state.editingVariantId===v.id?'text-amber-600':'text-stone-300'}"></i>
                                        </button>
                                    `).join('')}
                                    <button onclick="addVariant()" class="w-full p-4 border border-dashed rounded-2xl text-stone-400 text-xs font-bold hover:bg-stone-50">+ Varian Baru</button>
                                </div>
                            </div>
                        </div>
                        <div class="md:col-span-8">
                            ${currentVariant ? `
                                <div class="bg-white p-8 rounded-[32px] border border-stone-100 shadow-sm space-y-6">
                                    <div class="flex justify-between items-center">
                                        <h3 class="text-xl font-black">Edit Komposisi: ${currentVariant.name}</h3>
                                        <button onclick="if(confirm('Hapus varian ini?')){ delVariant(${currentVariant.id}); }" class="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                    </div>
                                    
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div class="bg-stone-50 p-3 rounded-xl md:col-span-1">
                                            <label class="text-[10px] font-black text-stone-400 uppercase">Ukuran Botol</label>
                                            <select id="var-size-${currentVariant.id}" class="w-full bg-transparent font-bold outline-none text-stone-800 mt-1" onchange="updateVar(${currentVariant.id}, 'bottleSize', this.value)">
                                                <option value="250 ml" ${currentVariant.bottleSize === '250 ml' ? 'selected' : ''}>250 ml</option>
                                                <option value="500 ml" ${currentVariant.bottleSize === '500 ml' ? 'selected' : ''}>500 ml</option>
                                                <option value="1 Liter" ${currentVariant.bottleSize === '1 Liter' ? 'selected' : ''}>1 Liter</option>
                                            </select>
                                        </div>
                                        <div class="bg-stone-50 p-3 rounded-xl md:col-span-1">
                                            <label class="text-[10px] font-black text-stone-400 uppercase">Nama</label>
                                            <input id="var-name-${currentVariant.id}" class="w-full bg-transparent font-bold outline-none mt-1" value="${currentVariant.name}" onchange="updateVar(${currentVariant.id}, 'name', this.value)">
                                        </div>
                                        <div class="bg-stone-50 p-3 rounded-xl md:col-span-1">
                                            <label class="text-[10px] font-black text-stone-400 uppercase">Harga</label>
                                            <input id="var-price-${currentVariant.id}" class="w-full bg-transparent font-bold text-amber-700 outline-none mt-1" type="number" value="${currentVariant.price}" onchange="updateVar(${currentVariant.id}, 'price', parseInt(this.value))">
                                        </div>
                                    </div>

                                    <div class="space-y-3">
                                        <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Resep per Botol</p>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            ${state.ingredients.map(ing => {
                                                const recipe = currentVariant.recipe.find(r => r.ingId === ing.id);
                                                return `
                                                    <div class="flex items-center justify-between p-3 bg-stone-50 rounded-2xl border border-stone-100">
                                                        <span class="text-xs font-bold text-stone-600 truncate mr-2" title="${ing.name}">${ing.name}</span>
                                                        <div class="flex items-center gap-2">
                                                            <input id="rec-${currentVariant.id}-ing-${ing.id}" class="w-16 p-2 border rounded-lg text-center font-black text-amber-900 text-xs outline-none" type="number" value="${recipe ? recipe.qty : ''}" placeholder="0" onchange="updateRecipe(${currentVariant.id}, ${ing.id}, this.value)">
                                                            <span class="text-[9px] font-bold text-stone-400 uppercase w-4">${ing.unit}</span>
                                                        </div>
                                                    </div>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                    <div class="bg-amber-800 p-4 rounded-2xl flex justify-between items-center text-white">
                                        <span class="text-sm font-bold flex items-center gap-2"><i data-lucide="calculator" class="w-4 h-4 text-amber-300"></i> HPP Total per Unit</span>
                                        <span class="text-xl font-black italic">${formatIDR(calculateVariantMetrics(currentVariant).totalHpp)}</span>
                                    </div>
                                </div>
                            ` : `<div class="h-full min-h-[400px] border-2 border-dashed border-stone-200 rounded-[32px] flex items-center justify-center text-stone-300 font-bold bg-white">Pilih Varian untuk mengatur racikan resep</div>`}
                        </div>
                    </div>

                    <!-- 5. ZONA BERBAHAYA (RESET DATA) -->
                    <section class="bg-red-50 p-8 rounded-[32px] border border-red-100 shadow-sm mt-8">
                        <div class="mb-6">
                            <h3 class="text-xl font-black flex items-center gap-2 text-red-800"><i data-lucide="alert-triangle" class="text-red-600"></i> 5. Zona Berbahaya</h3>
                            <p class="text-xs text-red-600/70 mt-1 font-medium">Tindakan ini akan menghapus data secara permanen dari database cloud.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <button onclick="promptReset('sales')" class="p-4 bg-white border border-red-200 rounded-2xl text-left hover:bg-red-100 transition-colors shadow-sm">
                                <h4 class="font-bold text-red-800 text-sm mb-1">Riwayat Penjualan</h4>
                                <p class="text-[10px] text-red-500 leading-tight">Hapus semua data transaksi kasir dan laporan laba.</p>
                            </button>
                            <button onclick="promptReset('assets')" class="p-4 bg-white border border-red-200 rounded-2xl text-left hover:bg-red-100 transition-colors shadow-sm">
                                <h4 class="font-bold text-red-800 text-sm mb-1">Aset & Operasional</h4>
                                <p class="text-[10px] text-red-500 leading-tight">Hapus daftar aset tetap dan biaya overhead bulanan.</p>
                            </button>
                            <button onclick="promptReset('recipes')" class="p-4 bg-white border border-red-200 rounded-2xl text-left hover:bg-red-100 transition-colors shadow-sm">
                                <h4 class="font-bold text-red-800 text-sm mb-1">Bahan & Resep</h4>
                                <p class="text-[10px] text-red-500 leading-tight">Hapus seluruh data gudang bahan baku dan varian resep.</p>
                            </button>
                            <button onclick="promptReset('all')" class="p-4 bg-red-600 border border-red-700 rounded-2xl text-left hover:bg-red-800 transition-colors text-white shadow-md">
                                <h4 class="font-bold text-white text-sm mb-1">Reset Semua Data</h4>
                                <p class="text-[10px] text-red-200 leading-tight">Kembalikan aplikasi seperti baru pertama kali digunakan.</p>
                            </button>
                        </div>
                    </section>
                </div>
            `;
        }

        // --- SISTEM PEMANGGIL MODAL KONFIRMASI ---
        window.promptReset = (type) => {
            let targetName = "";
            if (type === 'sales') targetName = "Riwayat Penjualan";
            if (type === 'assets') targetName = "Aset & Operasional";
            if (type === 'recipes') targetName = "Bahan & Resep";
            if (type === 'all') targetName = "Seluruh Data Aplikasi";

            showModal(
                'confirm', 
                'Hapus ' + targetName + '?', 
                'Data yang dihapus dari cloud tidak dapat dikembalikan. Apakah Anda yakin ingin melanjutkan?', 
                () => executeReset(type)
            );
        };

        // --- SISTEM PENGEKSEKUSI HAPUS KE SUPABASE ---
        window.executeReset = async (type) => {
            showModal('alert', 'Memproses...', 'Sedang menghubungi server cloud. Mohon tunggu...');
            
            try {
                if (type === 'sales' || type === 'all') {
                    const { error } = await supabaseClient.from('sales').delete().gt('id', 0);
                    if (error) throw error;
                    state.sales = [];
                }
                if (type === 'assets' || type === 'all') {
                    const { error: e1 } = await supabaseClient.from('assets').delete().gt('id', 0);
                    const { error: e2 } = await supabaseClient.from('ops_costs').delete().gt('id', 0);
                    if (e1) throw e1;
                    if (e2) throw e2;
                    state.assets = [];
                    state.opsCosts = [];
                }
                if (type === 'recipes' || type === 'all') {
                    const { error: e3 } = await supabaseClient.from('ingredients').delete().gt('id', 0);
                    const { error: e4 } = await supabaseClient.from('variants').delete().gt('id', 0);
                    if (e3) throw e3;
                    if (e4) throw e4;
                    state.ingredients = [];
                    state.variants = [];
                    state.editingVariantId = null;
                }
                if (type === 'all') {
                    const { error: e5 } = await supabaseClient.from('resellers').delete().gt('id', 0);
                    if (e5) throw e5;
                    state.resellers = [];
                }
                
                render();
                setTimeout(() => { showModal('alert', 'Berhasil!', 'Data telah dihapus bersih dari sistem.'); }, 200);
            } catch (error) {
                console.error("Gagal menghapus data:", error);
                showModal('alert', 'Gagal Menghapus', 'Perintah ditolak oleh Supabase.');
            }
        };

        window.addVariant = () => {
            const nid = Date.now();
            // Trik khusus agar bottleSize dapat tersimpan di Supabase tanpa mengubah skema (diselipkan di resep)
            const dbItem = { id: nid, name: 'Varian Baru', price: 0, recipe: [{ ingId: 'SIZE', qty: '250 ml' }] };
            supabaseClient.from('variants').insert([dbItem]).then();
            
            state.variants.push({ id: nid, name: 'Varian Baru', bottleSize: '250 ml', price: 0, recipe: [] });
            state.editingVariantId = nid;
            render();
        };
        window.delVariant = (id) => {
            supabaseClient.from('variants').delete().eq('id', id).then();
            state.variants = state.variants.filter(x => x.id !== id);
            state.editingVariantId = null;
            render();
        };
        window.updateVar = (id, f, v) => {
            const x = state.variants.find(y => y.id === id);
            if (x) {
                x[f] = v;
                if (f === 'bottleSize') {
                    // Update ukuran botol lewat array JSON
                    const dbRecipe = [...x.recipe, { ingId: 'SIZE', qty: v }];
                    supabaseClient.from('variants').update({ recipe: dbRecipe }).eq('id', id).then();
                } else {
                    supabaseClient.from('variants').update({ [f]: v }).eq('id', id).then();
                }
            }
            render();
        };
        window.updateRecipe = (vid, iid, qty) => {
            const v = state.variants.find(x => x.id === vid);
            if (v) {
                const other = v.recipe.filter(r => r.ingId !== iid);
                const q = parseFloat(qty);
                const newRecipe = q > 0 ? [...other, { ingId: iid, qty: q }] : other;
                v.recipe = newRecipe;
                
                // Pastikan ukuran botol ikut diselipkan
                const dbRecipe = [...newRecipe, { ingId: 'SIZE', qty: v.bottleSize || '250 ml' }];
                supabaseClient.from('variants').update({ recipe: dbRecipe }).eq('id', vid).then();
            }
            render();
        };
        window.updateTargetQty = (val) => {
            const newQty = parseInt(val) || 1;
            supabaseClient.from('settings').update({ targetQty: newQty }).eq('id', 1).then();
