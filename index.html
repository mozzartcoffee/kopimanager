                            100: 'var(--primary-100)',
                            200: 'var(--primary-200)',
                            300: 'var(--primary-300)',
                            400: 'var(--primary-400)',
                            500: 'var(--primary-500)',

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap');
        
        :root {
            /* Default Warna Amber */
            --primary-50: #fffbeb; --primary-100: #fef3c7; --primary-200: #fde68a; --primary-300: #fcd34d;
            --primary-400: #fbbf24; --primary-500: #f59e0b; --primary-600: #d97706; --primary-700: #b45309;
            --primary-800: #92400e; --primary-900: #78350f;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
        }
        h1, h2, h3, h4, h5, .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Scrollbar custom tipis */
        .thin-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .thin-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .thin-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .thin-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        
        .animate-fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* PENGATURAN MODE CETAK (PRINT) */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }

        function initThemeAndLogo() {

        function applyTheme(colorKey) {
            const colors = THEMES[colorKey] || THEMES.amber;
            const root = document.documentElement;
            for (const [weight, hex] of Object.entries(colors)) {
                root.style.setProperty(`--primary-${weight}`, hex);

        }

        // --- FETCH DATA DARI SUPABASE ---
        async function loadDataFromSupabase() {
            try {
                const [ingRes, astRes, opsRes, varRes, saleRes, setRes, resellerRes] = await Promise.all([
                    supabaseClient.from('ingredients').select('*').order('id'),
                    supabaseClient.from('assets').select('*').order('id'),
                    supabaseClient.from('ops_costs').select('*').order('id'),
                    supabaseClient.from('variants').select('*').order('id'),
                    supabaseClient.from('sales').select('*').order('timestamp', { ascending: false }),
                    supabaseClient.from('settings').select('*').eq('id', 1).single(),
                    supabaseClient.from('resellers').select('*').order('id') 
                ]);

                if (ingRes.data) state.ingredients = ingRes.data;
                if (astRes.data) state.assets = astRes.data;
                if (opsRes.data) state.opsCosts = opsRes.data;
                if (saleRes.data) state.sales = saleRes.data;
                if (setRes.data) state.targetQty = setRes.data.targetQty;
                if (resellerRes.data) state.resellers = resellerRes.data;

                if (varRes.data) {
                    state.variants = varRes.data.map(v => {
                        let bSize = '250 ml';
                        let cleanRecipe = [];
                        if (Array.isArray(v.recipe)) {
                            const sizeObj = v.recipe.find(r => r.ingId === 'SIZE');
                            if (sizeObj) bSize = sizeObj.qty;
                            cleanRecipe = v.recipe.filter(r => r.ingId !== 'SIZE');
                        }
                        return { ...v, bottleSize: bSize, recipe: cleanRecipe };
                    });
                }
            } catch (error) {
                console.error("Supabase Error:", error);
                showModal('alert', 'Koneksi Gagal', 'Pastikan koneksi internet stabil dan konfigurasi benar.');
            }
        }

        function getGroupedSales(salesArray) {
            let map = {};
            salesArray.forEach(s => {
                const parts = s.name.split('|');
                // parts[3] adalah status LUNAS/PIUTANG. Default ke LUNAS jika data lama tidak punya status.
                const status = parts[3] || 'LUNAS'; 
                
                const key = `${s.date}_${s.name}_${s.resellerId}_${status}`;
                // Menambahkan properti "ids" untuk melacak setiap ID di dalam grup
                if(!map[key]) { map[key] = { ...s, qty: 0, totalOmzet: 0, totalProfitReseller: 0, totalIngCost: 0, ids: [], paymentStatus: status }; }
                map[key].qty += 1;
                map[key].totalOmzet += s.price;
                map[key].totalProfitReseller += (s.resellerProfit || 0);
                map[key].totalIngCost += s.recordedIngredientCost;
                map[key].ids.push(s.id); 
            });
            return Object.values(map).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        }

        function getSalesChannelInfo(variantPrice) {
            let resellerId = null;
            let resellerName = 'Langsung (Kasir)';
            let resellerProfit = 0;
            if (state.selectedSalesChannel !== 'direct') {
                const r = state.resellers.find(x => x.id === parseInt(state.selectedSalesChannel));
                if (r) {
                    resellerId = r.id;
                    resellerName = `Reseller: ${r.name}`;
                    resellerProfit = variantPrice * ((r.discountRate || 0) / 100);
                }
            }
            return { resellerId, resellerName, resellerProfit };
        }

            const v = state.variants.find(x => x.id === variantId);

            const channelInfo = getSalesChannelInfo(v.price);
            
            // Format name: Nama|Ukuran|Metode|StatusPembayaran
            const fullName = `${v.name}|${v.bottleSize || '250 ml'}|${state.selectedPaymentMethod}|${state.selectedPaymentStatus}`;
            const newSale = {
                id: Date.now(),
                name: fullName,
                price: v.price, 
                recordedIngredientCost: variantHPPInfo.ingredientCostOnly,
                resellerId: channelInfo.resellerId,
                resellerName: channelInfo.resellerName,
                resellerProfit: channelInfo.resellerProfit, 
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })
            };
            
            supabaseClient.from('sales').insert([newSale]).then();
            state.sales.unshift(newSale);
            render();
        }

        window.executeMarkAsPaid = async (ids) => {
            showModal('alert', 'Memproses...', 'Menyimpan status pelunasan...');
            try {
                const updates = [];
                // Update state lokal
                state.sales = state.sales.map(s => {
                    if (ids.includes(s.id)) {
                        const parts = s.name.split('|');
                        parts[3] = 'LUNAS'; // Update index 3 (Status) ke LUNAS
                        const newName = parts.join('|');
                        updates.push({ id: s.id, name: newName });
                        return { ...s, name: newName };
                    }
                    return s;
                });

                // Update ke database Supabase
                for (let u of updates) {
                    await supabaseClient.from('sales').update({ name: u.name }).eq('id', u.id);
                }

                render();
                setTimeout(() => closeModal(), 300);

        window.executeEditSale = async (ids) => {
            const newQty = parseInt(document.getElementById('edit-qty').value);
            const newMethod = document.getElementById('edit-method').value;
            const newStatus = document.getElementById('edit-status').value;

            if (newQty < 1 || isNaN(newQty)) {
                alert('Qty harus minimal 1. Jika ingin membatalkan semua, gunakan Batal 1x.');
                return;
            }

            showModal('alert', 'Memproses...', 'Menyimpan perubahan transaksi...');

            try {
                const refItem = state.sales.find(s => s.id === ids[0]);
                if (!refItem) throw new Error('Data tidak ditemukan');
                
                const parts = refItem.name.split('|');
                const baseName = parts[0];
                const size = parts[1] || '250 ml';
                const newName = `${baseName}|${size}|${newMethod}|${newStatus}`;

                let currentIds = [...ids];
                const diff = newQty - currentIds.length;

                // 1. Jika Qty baru lebih kecil (Hapus kelebihan)
                if (diff < 0) {
                    const idsToDelete = currentIds.slice(newQty); 
                    await supabaseClient.from('sales').delete().in('id', idsToDelete);
                    state.sales = state.sales.filter(s => !idsToDelete.includes(s.id));
                    currentIds = currentIds.slice(0, newQty);
                }

                // 2. Jika Qty baru lebih besar (Tambah baru)
                if (diff > 0) {
                    const newSales = [];
                    for(let i=0; i < diff; i++) {
                        newSales.push({
                            id: Date.now() + Math.floor(Math.random() * 1000000) + i,
                            name: newName,
                            price: refItem.price,
                            recordedIngredientCost: refItem.recordedIngredientCost,

                            resellerName: refItem.resellerName,
                            resellerProfit: refItem.resellerProfit,
                            timestamp: refItem.timestamp,
                            date: refItem.date
                        });
                    }
                    await supabaseClient.from('sales').insert(newSales);
                    state.sales = [...newSales, ...state.sales];
                }

                // 3. Update data yang sudah ada jika Metode/Status berubah
                if (refItem.name !== newName) {
                    await supabaseClient.from('sales').update({ name: newName }).in('id', currentIds);
                    state.sales = state.sales.map(s => currentIds.includes(s.id) ? { ...s, name: newName } : s);

                state.sales.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

        // --- CALCULATIONS ---
        function calculateMonthlyAssetDepreciation() { return state.assets.reduce((acc, curr) => acc + (curr.cost / (curr.lifeYears * 12)), 0); }
        function calculateTotalMonthlyOverhead() { return state.opsCosts.reduce((acc, curr) => acc + curr.monthly, 0); }
        function calculateVariantMetrics(variant) {
            let ingredientCostOnly = 0;
            variant.recipe.forEach(r => {
                const ing = state.ingredients.find(i => i.id === r.ingId);
                if (ing) ingredientCostOnly += (ing.cost / ing.bulkAmount) * r.qty;
            });
            const monthlyDepreciation = calculateMonthlyAssetDepreciation();
            const monthlyOverhead = calculateTotalMonthlyOverhead();
            const totalMonthlyFixedCosts = monthlyDepreciation + monthlyOverhead;
            const fixedCostPerUnit = totalMonthlyFixedCosts / state.targetQty;
            
            let maxCanProduce = Infinity;
            if (variant.recipe.length === 0) maxCanProduce = 0;
            variant.recipe.forEach(r => {
                const ing = state.ingredients.find(i => i.id === r.ingId);
                if (ing && r.qty > 0) {
                    const possible = Math.floor(ing.bulkAmount / r.qty);
                    if (possible < maxCanProduce) maxCanProduce = possible;
                }
            });
            return {
                ingredientCostOnly,
                totalHpp: ingredientCostOnly + fixedCostPerUnit,
                maxCanProduce: maxCanProduce === Infinity ? 0 : maxCanProduce
            };
        }
        function calculateBEPMetrics() {
            const fixedCosts = calculateTotalMonthlyOverhead() + calculateMonthlyAssetDepreciation();
            if (state.variants.length === 0) return { bepUnits: 0, fixedCosts };
            let totalMargin = 0;
            state.variants.forEach(v => {
                let ingCost = 0;
                v.recipe.forEach(r => {
                    const ing = state.ingredients.find(i => i.id === r.ingId);
                    if (ing) ingCost += (ing.cost / ing.bulkAmount) * r.qty;
                });
                totalMargin += (v.price - ingCost);
            });
            const avgMargin = totalMargin / state.variants.length;
            const bepUnits = avgMargin > 0 ? Math.ceil(fixedCosts / avgMargin) : Infinity;
            return { bepUnits, fixedCosts };

        function renderLaporan(el) {
            const now = new Date();
            const reportData = state.sales.filter(sale => {
                const saleDate = new Date(sale.timestamp);
                saleDate.setHours(0,0,0,0);
                const today = new Date();
                today.setHours(0,0,0,0);

                if (state.reportFilter === 'daily') return saleDate.getTime() === today.getTime();
                if (state.reportFilter === 'weekly') {
                    const past = new Date(today); past.setDate(today.getDate() - 7);
                    return saleDate >= past && saleDate <= today;
                }
                if (state.reportFilter === 'monthly') return saleDate.getMonth() === today.getMonth() && saleDate.getFullYear() === today.getFullYear();
                if (state.reportFilter === 'custom') {
                    const start = new Date(state.reportStartDate); start.setHours(0,0,0,0);
                    const end = new Date(state.reportEndDate); end.setHours(23,59,59,999);
                    return saleDate >= start && saleDate <= end;
                }
                return true;
            });

            const monthlyOverhead = calculateTotalMonthlyOverhead();
            const monthlyDepreciation = calculateMonthlyAssetDepreciation();
            
            // Kalkulasi proporsional hari untuk biaya tetap
            let daysCount = 1;
            if (state.reportFilter === 'daily') daysCount = 1;
            else if (state.reportFilter === 'weekly') daysCount = 7;
            else if (state.reportFilter === 'monthly') daysCount = 30;
            else if (state.reportFilter === 'custom') {
                const start = new Date(state.reportStartDate);
                const end = new Date(state.reportEndDate);
                daysCount = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24)) + 1;
            }

            const allocOverhead = (monthlyOverhead / 30) * daysCount;
            const allocDepreciation = (monthlyDepreciation / 30) * daysCount;

            const revenue = reportData.reduce((a, b) => a + (b.price - (b.resellerProfit || 0)), 0);
            
            // Perhitungan Uang Masuk & Piutang untuk laporan
            let uangMasuk = 0;
            let piutang = 0;
            reportData.forEach(b => {
                const parts = b.name.split('|');
                const pStatus = parts[3] || 'LUNAS';
                const pureRevenue = b.price - (b.resellerProfit || 0);
                if (pStatus === 'LUNAS') uangMasuk += pureRevenue;
                if (pStatus === 'PIUTANG') piutang += pureRevenue;
            });

            const ingCosts = reportData.reduce((a, b) => a + b.recordedIngredientCost, 0);
            const netProfit = revenue - ingCosts - allocOverhead - allocDepreciation;
            const totalUnits = reportData.length;

            const bepMetrics = calculateBEPMetrics();
            let bepTarget = Math.ceil((bepMetrics.bepUnits / 30) * daysCount);
            const isBep = totalUnits >= bepTarget;

            el.innerHTML = `

                            <p class="text-xs text-slate-500 mt-0.5">Dikalkulasi otomatis termasuk Overhead & Penyusutan.</p>
                        </div>
                        <div class="flex flex-col items-end gap-2 w-full sm:w-auto">
                            <div class="flex items-center gap-3 w-full sm:w-auto">
                                <div class="bg-slate-100 p-1 rounded-xl flex overflow-x-auto thin-scrollbar max-w-[280px] sm:max-w-none">
                                    <button onclick="state.reportFilter='daily'; render();" class="shrink-0 px-4 py-1.5 rounded-lg text-xs font-bold ${state.reportFilter==='daily'?'bg-white shadow-sm text-primary-600':'text-slate-500'}">Harian</button>
                                    <button onclick="state.reportFilter='weekly'; render();" class="shrink-0 px-4 py-1.5 rounded-lg text-xs font-bold ${state.reportFilter==='weekly'?'bg-white shadow-sm text-primary-600':'text-slate-500'}">Mingguan</button>
                                    <button onclick="state.reportFilter='monthly'; render();" class="shrink-0 px-4 py-1.5 rounded-lg text-xs font-bold ${state.reportFilter==='monthly'?'bg-white shadow-sm text-primary-600':'text-slate-500'}">Bulanan</button>
                                    <button onclick="state.reportFilter='custom'; render();" class="shrink-0 px-4 py-1.5 rounded-lg text-xs font-bold ${state.reportFilter==='custom'?'bg-white shadow-sm text-primary-600':'text-slate-500'}">Kustom</button>
                                </div>
                                <button onclick="printLaporanReport()" class="hidden sm:flex bg-primary-600 text-white px-4 py-1.5 rounded-xl text-xs font-bold hover:bg-primary-700 transition-colors shadow-sm items-center gap-2">
                                    <i data-lucide="printer" class="w-4 h-4"></i> Cetak PDF
                                </button>
                            </div>
                            ${state.reportFilter === 'custom' ? `
                                <div class="flex items-center gap-2 bg-white p-1.5 rounded-xl border border-slate-200 shadow-sm text-xs w-full sm:w-auto justify-between sm:justify-start">
                                    <input type="date" value="${state.reportStartDate}" onchange="state.reportStartDate=this.value; render();" class="outline-none bg-transparent font-bold text-slate-600 px-2 cursor-pointer">
                                    <span class="text-slate-400 font-bold">-</span>
                                    <input type="date" value="${state.reportEndDate}" onchange="state.reportEndDate=this.value; render();" class="outline-none bg-transparent font-bold text-slate-600 px-2 cursor-pointer">
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <button onclick="printLaporanReport()" class="sm:hidden w-full flex justify-center bg-primary-600 text-white px-4 py-3 rounded-xl text-xs font-bold hover:bg-primary-700 transition-colors shadow-sm items-center gap-2">
                        <i data-lucide="printer" class="w-4 h-4"></i> Cetak PDF Laporan
                    </button>

                    <!-- INFO KAS MASUK DAN PIUTANG -->
                    <div class="bg-slate-900 rounded-2xl p-5 shadow-sm flex flex-col md:flex-row gap-4 justify-between text-white">
                        <div>
                            <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Total Omzet Tercipta</p>
                            <h4 class="text-2xl font-black text-primary-400">${formatIDR(revenue)}</h4>
                        </div>
                        <div class="flex gap-6">
                            <div class="border-l border-slate-700 pl-6">
                                <p class="text-emerald-500 text-[10px] font-bold uppercase mb-1">Kas Masuk (Lunas)</p>
                                <h4 class="text-lg font-black text-white">${formatIDR(uangMasuk)}</h4>
                            </div>
                            <div class="border-l border-slate-700 pl-6">
                                <p class="text-red-500 text-[10px] font-bold uppercase mb-1">Status Piutang</p>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">

                        <div class="bg-white p-4 rounded-2xl border border-slate-200">
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Overhead Pro-rata</p><h4 class="text-sm font-black text-red-400">${formatIDR(allocOverhead)}</h4>

                        <div class="bg-white p-4 rounded-2xl border border-slate-200">
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Penyusutan</p><h4 class="text-sm font-black text-primary-500">${formatIDR(allocDepreciation)}</h4>
                        </div>
                        <div class="p-4 rounded-2xl border ${netProfit >= 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}">
                            <p class="text-[9px] font-bold uppercase mb-1 ${netProfit >= 0 ? 'text-emerald-600' : 'text-red-500'}" title="Dihitung dari Total Omzet Tercipta">Laba Bersih Final</p>
                            <h4 class="text-lg font-black ${netProfit >= 0 ? 'text-emerald-700' : 'text-red-600'}">${netProfit < 0 ? '-' : ''}${formatIDR(Math.abs(netProfit))}</h4>

                            <span class="text-[10px] font-bold px-2.5 py-1 rounded-md ${isBep ? 'bg-emerald-100 text-emerald-700' : 'bg-primary-100 text-primary-700'}">${isBep ? 'Tercapai' : 'Belum BEP'}</span>

                    </div>
                </div>
            `;
        }

                                    <h3 class="font-bold text-xs mb-2 text-slate-600">Aset (Depresiasi)</h3>
                                    ${state.assets.map(a => `
                                        <div class="flex gap-1 mb-1">
                                            <input class="w-1/2 bg-slate-50 border border-slate-100 rounded px-1.5 py-1 text-[9px] outline-none" value="${a.name}" onchange="updateAsset(${a.id}, 'name', this.value)">
                                            <input type="number" class="w-1/4 bg-slate-50 border border-slate-100 rounded px-1 text-[9px] outline-none" value="${a.cost}" title="Harga Beli" onchange="updateAsset(${a.id}, 'cost', parseFloat(this.value))">
                                            <input type="number" class="w-1/4 bg-slate-50 border border-slate-100 rounded px-1 text-[9px] outline-none" value="${a.lifeYears}" title="Tahun" onchange="updateAsset(${a.id}, 'lifeYears', parseFloat(this.value))">
                                        </div>
                                    `).join('')}
                                    <button onclick="addAsset()" class="text-[9px] text-blue-500 font-bold mt-1 hover:underline">+ Tambah</button>
                                </div>
                            </div>
                        </div>

                        <!-- VARIAN RESEP -->
                        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm flex flex-col">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-sm flex items-center gap-2"><i data-lucide="coffee" class="w-4 h-4 text-primary-600"></i> Resep Varian</h3>
                                <button onclick="addVariant()" class="text-[10px] bg-primary-50 px-2 py-1 rounded font-bold text-primary-700 hover:bg-primary-100">+ Tambah Varian</button>
                            </div>
                            
                            <div class="flex gap-2 mb-4 overflow-x-auto thin-scrollbar pb-2">
                                ${state.variants.map(v => `
                                    <button onclick="state.editingVariantId=${v.id}; render();" class="shrink-0 px-3 py-1.5 rounded-lg border text-xs font-bold transition-colors whitespace-nowrap ${state.editingVariantId===v.id?'bg-slate-800 text-white border-slate-800':'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}">${v.name}</button>
                                `).join('')}
                            </div>

                            ${currentVariant ? `
                                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <div class="flex justify-between items-start mb-3">
                                        <div class="grid grid-cols-2 gap-2 w-full pr-4">
                                            <input class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs font-bold outline-none" value="${currentVariant.name}" onchange="updateVar(${currentVariant.id}, 'name', this.value)">
                                            <input type="number" class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs font-bold text-primary-600 outline-none" value="${currentVariant.price}" placeholder="Harga" onchange="updateVar(${currentVariant.id}, 'price', parseInt(this.value))">
                                            <select class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs font-bold outline-none col-span-2" onchange="updateVar(${currentVariant.id}, 'bottleSize', this.value)">
                                                <option value="250 ml" ${currentVariant.bottleSize==='250 ml'?'selected':''}>Botol 250 ml</option>
                                                <option value="500 ml" ${currentVariant.bottleSize==='500 ml'?'selected':''}>Botol 500 ml</option>
                                                <option value="1 Liter" ${currentVariant.bottleSize==='1 Liter'?'selected':''}>Botol 1 Liter</option>
                                            </select>
                                        </div>
                                        <button onclick="if(confirm('Hapus Varian Ini?')){ delVariant(${currentVariant.id}); }" class="text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Komposisi (Takaran)</p>
                                    <div class="space-y-1.5 max-h-[250px] overflow-y-auto pr-2 thin-scrollbar">
                                        ${state.ingredients.map(ing => {
                                            const rec = currentVariant.recipe.find(r => r.ingId === ing.id);
                                            return `
                                                <div class="flex justify-between items-center text-xs">
                                                    <span class="text-slate-600 line-clamp-1 pr-2">${ing.name}</span>
                                                    <div class="flex bg-white border border-slate-200 rounded overflow-hidden shrink-0">
                                                        <input type="number" class="w-12 text-center text-[10px] font-bold outline-none py-0.5" value="${rec?rec.qty:''}" placeholder="0" onchange="updateRecipe(${currentVariant.id}, ${ing.id}, this.value)">
                                                        <span class="bg-slate-100 text-[8px] font-bold text-slate-400 px-1 py-0.5 border-l">${ing.unit}</span>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            ` : `<div class="flex-1 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-400 text-xs font-medium min-h-[150px]">Pilih varian di atas</div>`}
                        </div>
                    </div>

                    <!-- DANGER ZONE -->
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-xs text-red-800">Zona Bahaya</h4>
                            <p class="text-[9px] text-red-500 mt-0.5">Hapus data (Penjualan / Semua Data)</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="promptReset('sales')" class="px-3 py-1.5 bg-white border border-red-200 rounded-lg text-[10px] font-bold text-red-600 hover:bg-red-100 transition-colors">Reset Penjualan</button>
                            <button onclick="promptReset('all')" class="px-3 py-1.5 bg-red-600 rounded-lg text-[10px] font-bold text-white hover:bg-red-700 transition-colors">Reset Total</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- SISTEM RESET & CRUD ---
        window.promptReset = (type) => {
            let targetName = type === 'sales' ? "Seluruh Riwayat Penjualan" : "Seluruh Data Aplikasi";
            showModal('confirm', 'Hapus ' + targetName + '?', 'Tindakan ini permanen. Semua data penjualan akan direset. Lanjutkan?', () => executeReset(type));
        };

        window.executeReset = async (type) => {
            showModal('alert', 'Memproses...', 'Menghubungi server...');
            try {
                if (type === 'sales' || type === 'all') {
                    const { error } = await supabaseClient.from('sales').delete().gt('id', 0);
                    if (error) throw error;
                    state.sales = [];
                }
                if (type === 'all') {
                    await supabaseClient.from('assets').delete().gt('id', 0);
                    await supabaseClient.from('ops_costs').delete().gt('id', 0);
                    await supabaseClient.from('ingredients').delete().gt('id', 0);
                    await supabaseClient.from('variants').delete().gt('id', 0);
                    await supabaseClient.from('resellers').delete().gt('id', 0);
                    state.assets = []; state.opsCosts = []; state.ingredients = []; state.variants = []; state.resellers = []; state.editingVariantId = null;
                }
                render();
                setTimeout(() => { closeModal(); }, 500);
            } catch (error) { showModal('alert', 'Gagal', 'Akses ditolak server.'); }
        };

        window.addReseller = () => { const newItem = { id: Date.now(), name: 'Toko Baru', phone: '', discountRate: 10 }; supabaseClient.from('resellers').insert([newItem]).then(); state.resellers.push(newItem); render(); };
        window.updateReseller = (id, f, v) => { supabaseClient.from('resellers').update({ [f]: v }).eq('id', id).then(); const r = state.resellers.find(x => x.id === id); if (r) r[f] = v; render(); };
        window.delReseller = (id) => { supabaseClient.from('resellers').delete().eq('id', id).then(); state.resellers = state.resellers.filter(x => x.id !== id); render(); };

        window.addIngredient = () => { const newItem = { id: Date.now(), name: 'Bahan Baru', cost: 0, bulkAmount: 100, unit: 'g' }; supabaseClient.from('ingredients').insert([newItem]).then(); state.ingredients.push(newItem); render(); };
        window.updateIng = (id, f, v) => { supabaseClient.from('ingredients').update({ [f]: v }).eq('id', id).then(); const i = state.ingredients.find(x => x.id === id); if (i) i[f] = v; render(); };
        window.delIng = (id) => { supabaseClient.from('ingredients').delete().eq('id', id).then(); state.ingredients = state.ingredients.filter(x => x.id !== id); render(); };
        
        window.addStock = (id) => {
            const inputEl = document.getElementById(`add-stock-${id}`);
            const amountToAdd = parseFloat(inputEl.value);
            
            if (!amountToAdd || amountToAdd <= 0) {
                return showModal('alert', 'Perhatian', 'Masukkan angka jumlah stok yang baru dibeli pada kolom.');
            }
            
            const ing = state.ingredients.find(x => x.id === id);
            if (ing) {
                const newTotal = ing.bulkAmount + amountToAdd;
                supabaseClient.from('ingredients').update({ bulkAmount: newTotal }).eq('id', id).then();
                ing.bulkAmount = newTotal;
                
                showModal('alert', 'Stok Berhasil Ditambah', `Stok ${ing.name} bertambah sebanyak ${amountToAdd} ${ing.unit}. Total sekarang menjadi ${newTotal} ${ing.unit}. Kapasitas botol otomatis ter-update.`);
                render();
            }
        };

        window.addAsset = () => { const newItem = { id: Date.now(), name: 'Aset Baru', cost: 0, lifeYears: 5 }; supabaseClient.from('assets').insert([newItem]).then(); state.assets.push(newItem); render(); };
        window.updateAsset = (id, f, v) => { supabaseClient.from('assets').update({ [f]: v }).eq('id', id).then(); const a = state.assets.find(x => x.id === id); if (a) a[f] = v; render(); };
        window.delAsset = (id) => { supabaseClient.from('assets').delete().eq('id', id).then(); state.assets = state.assets.filter(x => x.id !== id); render(); };

        window.addVariant = () => { const nid = Date.now(); const dbItem = { id: nid, name: 'Varian Baru', price: 0, recipe: [{ ingId: 'SIZE', qty: '250 ml' }] }; supabaseClient.from('variants').insert([dbItem]).then(); state.variants.push({ id: nid, name: 'Varian Baru', bottleSize: '250 ml', price: 0, recipe: [] }); state.editingVariantId = nid; render(); };
        window.delVariant = (id) => { supabaseClient.from('variants').delete().eq('id', id).then(); state.variants = state.variants.filter(x => x.id !== id); state.editingVariantId = null; render(); };
        window.updateVar = (id, f, v) => { const x = state.variants.find(y => y.id === id); if (x) { x[f] = v; if (f === 'bottleSize') { const dbRecipe = [...x.recipe, { ingId: 'SIZE', qty: v }]; supabaseClient.from('variants').update({ recipe: dbRecipe }).eq('id', id).then(); } else { supabaseClient.from('variants').update({ [f]: v }).eq('id', id).then(); } } render(); };
        window.updateRecipe = (vid, iid, qty) => { const v = state.variants.find(x => x.id === vid); if (v) { const other = v.recipe.filter(r => r.ingId !== iid); const q = parseFloat(qty); const newRecipe = q > 0 ? [...other, { ingId: iid, qty: q }] : other; v.recipe = newRecipe; const dbRecipe = [...newRecipe, { ingId: 'SIZE', qty: v.bottleSize || '250 ml' }]; supabaseClient.from('variants').update({ recipe: dbRecipe }).eq('id', vid).then(); } render(); };
        
        window.updateTargetQty = (val) => { const newQty = parseInt(val) || 1; supabaseClient.from('settings').update({ targetQty: newQty }).eq('id', 1).then(); state.targetQty = newQty; render(); };
        window.addOps = () => { const newItem = { id: Date.now(), name: 'Biaya', monthly: 0 }; supabaseClient.from('ops_costs').insert([newItem]).then(); state.opsCosts.push(newItem); render(); };
        window.updateOpsCost = (id, f, v) => { supabaseClient.from('ops_costs').update({ [f]: v }).eq('id', id).then(); const o = state.opsCosts.find(x => x.id === id); if (o) o[f] = v; render(); };
        window.delOps = (id) => { supabaseClient.from('ops_costs').delete().eq('id', id).then(); state.opsCosts = state.opsCosts.filter(x => x.id !== id); render(); };

        // --- AUTH LOGIC ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const em = document.getElementById('email').value;
            const pw = document.getElementById('password').value;
            if (em === 'ruang.mozzart@gmail.com' && pw === 'R4h45i4ku') {
                const btn = e.target.querySelector('button');
                const origHtml = btn.innerHTML;
                btn.innerHTML = 'Memuat...';
                await loadDataFromSupabase();
                state.isLoggedIn = true;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                render();
                btn.innerHTML = origHtml;
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        // Initialize App UI settings on load
        initThemeAndLogo();
    </script>
</body>
</html>
