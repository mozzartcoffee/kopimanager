<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozzart Coffee Manager - Sistem POS Kopi Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Konfigurasi Tema Dinamis Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: 'var(--primary-50)',
                            100: 'var(--primary-100)',
                            200: 'var(--primary-200)',
                            300: 'var(--primary-300)',
                            400: 'var(--primary-400)',
                            500: 'var(--primary-500)',
                            600: 'var(--primary-600)',
                            700: 'var(--primary-700)',
                            800: 'var(--primary-800)',
                            900: 'var(--primary-900)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap');
        
        :root {
            /* Default Warna Amber */
            --primary-50: #fffbeb; --primary-100: #fef3c7; --primary-200: #fde68a; --primary-300: #fcd34d;
            --primary-400: #fbbf24; --primary-500: #f59e0b; --primary-600: #d97706; --primary-700: #b45309;
            --primary-800: #92400e; --primary-900: #78350f;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
        }
        h1, h2, h3, h4, h5, .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Scrollbar custom tipis */
        .thin-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .thin-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .thin-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .thin-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        
        .animate-fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* PENGATURAN MODE CETAK (PRINT) */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; background: white;}
            .no-print { display: none !important; }
        }

        /* Glassmorphism utils */
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- LOGIN OVERLAY -->
    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-50 flex items-center justify-center p-4">
        <div class="max-w-sm w-full bg-white p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 animate-fade-in text-center">
            <div id="login-logo-container" class="w-16 h-16 bg-primary-50 rounded-2xl flex items-center justify-center mx-auto mb-5 text-primary-600">
                <!-- Logo akan diinject via JS -->
            </div>
            <h1 class="text-2xl font-heading font-extrabold text-slate-900 tracking-tight mb-1">Mozzart Coffee<span class="text-primary-500">.</span></h1>
            <p class="text-slate-500 text-xs font-medium mb-8">Manajemen Kafe & POS Pro</p>
            
            <form id="login-form" class="space-y-3">
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-3.5 text-slate-400 w-4 h-4"></i>
                    <input type="email" id="email" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all" placeholder="Email Anda" required>
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-3.5 text-slate-400 w-4 h-4"></i>
                    <input type="password" id="password" class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all" placeholder="Password" required>

    <!-- MAIN APP LAYOUT -->
    <div id="app-screen" class="hidden w-full h-full flex flex-col md:flex-row no-print">
        
        <!-- SIDEBAR (DESKTOP) -->
        <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 h-full flex-shrink-0">
            <div class="p-6">
                <h1 class="text-xl font-heading font-extrabold flex items-center gap-2 tracking-tight text-slate-900">

                <p class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 mt-4">Menu Utama</p>
                <button onclick="switchTab('dashboard')" id="nav-desktop-dashboard" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-500 hover:bg-slate-50"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dasbor</button>
                <button onclick="switchTab('transaksi')" id="nav-desktop-transaksi" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-500 hover:bg-slate-50"><i data-lucide="shopping-bag" class="w-4 h-4"></i> Kasir & Jual</button>

                <button onclick="switchTab('pengaturan')" id="nav-desktop-pengaturan" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-500 hover:bg-slate-50"><i data-lucide="sliders" class="w-4 h-4"></i> Pengaturan</button>

                <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50 transition-all"><i data-lucide="log-out" class="w-4 h-4"></i> Keluar</button>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            <!-- MOBILE HEADER (Sticky) -->
            <header class="md:hidden glass z-30 px-5 py-4 border-b border-slate-200 flex justify-between items-center sticky top-0">
                <h1 class="text-lg font-heading font-extrabold flex items-center gap-2">
                    <span id="mobile-logo-container" class="flex shrink-0"></span> Mozzart Coffee
                </h1>
                <button onclick="logout()" class="text-slate-400 hover:text-red-500 p-1"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </header>

            <!-- SCROLLABLE TAB CONTENT -->
            <div class="flex-1 overflow-y-auto thin-scrollbar p-4 md:p-8 pb-24 md:pb-8">
                <div id="tab-content" class="max-w-5xl mx-auto w-full"></div>
            </div>

            <!-- MOBILE BOTTOM NAV -->
            <nav class="md:hidden glass border-t border-slate-200 fixed bottom-0 w-full z-40 pb-safe">
                <div class="flex justify-around items-center p-2">
                    <button onclick="switchTab('dashboard')" id="nav-mobile-dashboard" class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-400 min-w-[64px]"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[9px] font-bold">Dasbor</span></button>
                    <button onclick="switchTab('transaksi')" id="nav-mobile-transaksi" class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-400 min-w-[64px]"><i data-lucide="shopping-bag" class="w-5 h-5"></i><span class="text-[9px] font-bold">Kasir</span></button>
                    <button onclick="switchTab('rekap')" id="nav-mobile-rekap" class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-400 min-w-[64px]"><i data-lucide="clipboard-check" class="w-5 h-5"></i><span class="text-[9px] font-bold">Rekap</span></button>
                    <button onclick="switchTab('laporan')" id="nav-mobile-laporan" class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-400 min-w-[64px]"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[9px] font-bold">Laba</span></button>
                    <button onclick="switchTab('pengaturan')" id="nav-mobile-pengaturan" class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-400 min-w-[64px]"><i data-lucide="sliders" class="w-5 h-5"></i><span class="text-[9px] font-bold">Menu</span></button>
                </div>
            </nav>
        </main>
    </div>

    <!-- AREA KHUSUS UNTUK CETAK/PRINT -->
    <div id="print-area"></div>

    <!-- MODAL CONTAINER -->
    <div id="modal-container" class="no-print"></div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://wvidkpxauvadjykrksan.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2aWRrcHhhdXZhZGp5a3Jrc2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODk4ODAsImV4cCI6MjA4NzI2NTg4MH0.hhUVmvDs690jFF6osVyYBeIcaPaROtJV1tEA1QUb-GY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- DAFTAR TEMA WARNA ---
        const THEMES = {
            amber: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309', 800: '#92400e', 900: '#78350f' },
            emerald: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
            blue: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
            rose: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 300: '#fda4af', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c', 800: '#9f1239', 900: '#881337' },
            slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
        };

        // --- APP STATE ---
        let state = {
            isLoggedIn: false,
            activeTab: 'transaksi', 
            reportFilter: 'daily',
            rekapDate: new Date().toISOString().split('T')[0],
            editingVariantId: null,
            selectedSalesChannel: 'direct', 
            selectedPaymentMethod: 'CASH',
            selectedReportReseller: 'all', 
            ingredients: [],
            assets: [],
            opsCosts: [],
            resellers: [], 
            targetQty: 500,
            variants: [],
            sales: [],
            modal: { isOpen: false, type: 'alert', title: '', message: '', onConfirm: null },
            theme: 'amber',
            logoUrl: null
        };

        // --- THEME & LOGO INITS ---
        function initThemeAndLogo() {
            const storedTheme = localStorage.getItem('mozzart_theme') || 'amber';
            state.theme = storedTheme;
            applyTheme(storedTheme);
            
            state.logoUrl = localStorage.getItem('mozzart_logo');
            updateAppUI();
        }

        function applyTheme(colorKey) {
            const colors = THEMES[colorKey] || THEMES.amber;
            const root = document.documentElement;
            for (const [weight, hex] of Object.entries(colors)) {
                root.style.setProperty(`--primary-${weight}`, hex);
            }
        }

        window.changeTheme = (themeName) => {
            state.theme = themeName;
            applyTheme(themeName);
            localStorage.setItem('mozzart_theme', themeName);
            render(); 
        };

        window.handleLogoUpload = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result;
                    state.logoUrl = base64;
                    localStorage.setItem('mozzart_logo', base64);
                    updateAppUI();
                    if(state.activeTab === 'pengaturan') render();
                };
                reader.readAsDataURL(file);
            }
        };

        window.resetLogo = () => {
            state.logoUrl = null;
            localStorage.removeItem('mozzart_logo');
            updateAppUI();
            if(state.activeTab === 'pengaturan') render();
        };

        function updateAppUI() {
            const logoHtmlLarge = state.logoUrl ? `<img src="${state.logoUrl}" class="w-full h-full object-cover rounded-2xl">` : `<i data-lucide="coffee" class="w-8 h-8 text-primary-600"></i>`;
            const logoHtmlSmall = state.logoUrl ? `<img src="${state.logoUrl}" class="w-7 h-7 object-cover rounded-md border border-slate-200">` : `<i data-lucide="coffee" class="text-primary-600 w-6 h-6"></i>`;
            const logoHtmlMobile = state.logoUrl ? `<img src="${state.logoUrl}" class="w-5 h-5 object-cover rounded border border-slate-200">` : `<i data-lucide="coffee" class="text-primary-600 w-5 h-5"></i>`;
            
            const loginEl = document.getElementById('login-logo-container');
            const sideEl = document.getElementById('sidebar-logo-container');
            const mobEl = document.getElementById('mobile-logo-container');
            
            if(loginEl) loginEl.innerHTML = logoHtmlLarge;
            if(sideEl) sideEl.innerHTML = logoHtmlSmall;
            if(mobEl) mobEl.innerHTML = logoHtmlMobile;
            
            lucide.createIcons();
        }

        // --- CUSTOM MODAL UI SYSTEM ---
        window.showModal = (type, title, message, onConfirm = null) => {
            state.modal = { isOpen: true, type, title, message, onConfirm };
            renderModal();
        };

        window.closeModal = () => {
            state.modal.isOpen = false;
            renderModal();
        };

        window.confirmModal = () => {
            if (state.modal.onConfirm) state.modal.onConfirm();
            closeModal();
        };

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (!state.modal.isOpen) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = `
                <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in">
                    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-xl border border-slate-100">
                        <div class="w-10 h-10 rounded-full ${state.modal.type === 'confirm' ? 'bg-red-50 text-red-500' : 'bg-primary-50 text-primary-500'} flex items-center justify-center mb-4">
                            <i data-lucide="${state.modal.type === 'confirm' ? 'alert-triangle' : 'info'}" class="w-5 h-5"></i>
                        </div>
                        <h3 class="text-lg font-heading font-bold text-slate-800 mb-1">${state.modal.title}</h3>
                        <p class="text-sm text-slate-500 mb-6 leading-relaxed">${state.modal.message}</p>
                        <div class="flex justify-end gap-2">
                            ${state.modal.type === 'confirm' ? `<button onclick="closeModal()" class="px-4 py-2 rounded-xl text-slate-500 font-semibold hover:bg-slate-50 transition-colors text-sm">Batal</button>` : ''}
                            <button onclick="confirmModal()" class="px-4 py-2 rounded-xl ${state.modal.type === 'confirm' ? 'bg-red-500 hover:bg-red-600' : 'bg-slate-900 hover:bg-slate-800'} text-white font-semibold transition-colors text-sm shadow-sm">
                                ${state.modal.type === 'confirm' ? 'Lanjutkan' : 'Tutup'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- FETCH DATA DARI SUPABASE ---
        async function loadDataFromSupabase() {
            try {
                const [ingRes, astRes, opsRes, varRes, saleRes, setRes, resellerRes] = await Promise.all([
                    supabaseClient.from('ingredients').select('*').order('id'),
                    supabaseClient.from('assets').select('*').order('id'),
                    supabaseClient.from('ops_costs').select('*').order('id'),
                    supabaseClient.from('variants').select('*').order('id'),
                    supabaseClient.from('sales').select('*').order('timestamp', { ascending: false }),
                    supabaseClient.from('settings').select('*').eq('id', 1).single(),
                    supabaseClient.from('resellers').select('*').order('id') 
                ]);

                if (ingRes.data) state.ingredients = ingRes.data;
                if (astRes.data) state.assets = astRes.data;
                if (opsRes.data) state.opsCosts = opsRes.data;
                if (saleRes.data) state.sales = saleRes.data;
                if (setRes.data) state.targetQty = setRes.data.targetQty;
                if (resellerRes.data) state.resellers = resellerRes.data;

                if (varRes.data) {
                    state.variants = varRes.data.map(v => {
                        let bSize = '250 ml';
                        let cleanRecipe = [];
                        if (Array.isArray(v.recipe)) {
                            const sizeObj = v.recipe.find(r => r.ingId === 'SIZE');
                            if (sizeObj) bSize = sizeObj.qty;
                            cleanRecipe = v.recipe.filter(r => r.ingId !== 'SIZE');
                        }
                        return { ...v, bottleSize: bSize, recipe: cleanRecipe };
                    });
                }
            } catch (error) {
                console.error("Supabase Error:", error);
                showModal('alert', 'Koneksi Gagal', 'Pastikan koneksi internet stabil dan konfigurasi benar.');
            }
        }

        // --- CORE FUNCTIONS ---
        function formatIDR(num) {
            return "Rp " + Math.round(num).toLocaleString('id-ID');
        }

        function switchTab(tab) {
            state.activeTab = tab;
            render();
        }

        function logout() {
            state.isLoggedIn = false;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }

        function getGroupedSales(salesArray) {
            let map = {};
            salesArray.forEach(s => {
                const key = `${s.date}_${s.name}_${s.resellerId}`;
                if(!map[key]) { map[key] = { ...s, qty: 0, totalOmzet: 0, totalProfitReseller: 0, totalIngCost: 0 }; }
                map[key].qty += 1;
                map[key].totalOmzet += s.price;
                map[key].totalProfitReseller += (s.resellerProfit || 0);
                map[key].totalIngCost += s.recordedIngredientCost;
            });
            return Object.values(map).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        }

        function getSalesChannelInfo(variantPrice) {
            let resellerId = null;
            let resellerName = 'Langsung (Kasir)';
            let resellerProfit = 0;
            if (state.selectedSalesChannel !== 'direct') {
                const r = state.resellers.find(x => x.id === parseInt(state.selectedSalesChannel));
                if (r) {
                    resellerId = r.id;
                    resellerName = `Reseller: ${r.name}`;
                    resellerProfit = variantPrice * ((r.discountRate || 0) / 100);
                }
            }
            return { resellerId, resellerName, resellerProfit };
        }

        function addSale(variantId) {
            const v = state.variants.find(x => x.id === variantId);
            const variantHPPInfo = calculateVariantMetrics(v);
            const channelInfo = getSalesChannelInfo(v.price);
            
            const fullName = `${v.name}|${v.bottleSize || '250 ml'}|${state.selectedPaymentMethod}`;
            const newSale = {
                id: Date.now(),
                name: fullName,
                price: v.price, 
                recordedIngredientCost: variantHPPInfo.ingredientCostOnly,
                resellerId: channelInfo.resellerId,
                resellerName: channelInfo.resellerName,
                resellerProfit: channelInfo.resellerProfit, 
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })
            };
            
            supabaseClient.from('sales').insert([newSale]).then();
            state.sales.unshift(newSale);
            render();
        }

        window.submitBulkSales = async () => {
            const dateInput = document.getElementById('bulk-date').value;
            const paymentInput = document.getElementById('bulk-payment').value;
            if (!dateInput) return showModal('alert', 'Perhatian', 'Pilih tanggal terlebih dahulu.');

            const [year, month, day] = dateInput.split('-');
            const selectedDate = new Date(year, month - 1, day, 12, 0, 0); 
            const dateString = selectedDate.toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });

            let allNewSales = [];
            let totalQty = 0;

            state.variants.forEach(v => {
                const qtyInput = document.getElementById(`bulk-qty-${v.id}`).value;
                const qty = parseInt(qtyInput) || 0;
                
                if (qty > 0) {
                    const variantHPPInfo = calculateVariantMetrics(v);
                    const channelInfo = getSalesChannelInfo(v.price);
                    totalQty += qty;
                    const fullName = `${v.name}|${v.bottleSize || '250 ml'}|${paymentInput}`;
                    
                    for(let i=0; i < qty; i++) {
                        allNewSales.push({
                            id: Date.now() + Math.floor(Math.random() * 1000000) + i,
                            name: fullName,
                            price: v.price,
                            recordedIngredientCost: variantHPPInfo.ingredientCostOnly,
                            resellerId: channelInfo.resellerId,
                            resellerName: channelInfo.resellerName,
                            resellerProfit: channelInfo.resellerProfit,
                            timestamp: selectedDate.toISOString(),
                            date: dateString
                        });
                    }
                }
            });

            if (allNewSales.length === 0) return showModal('alert', 'Perhatian', 'Masukkan minimal 1 jumlah produk.');

            showModal('alert', 'Memproses...', `Menyimpan ${totalQty} botol.`);
            try {

        // --- CALCULATIONS ---
        function calculateMonthlyAssetDepreciation() { return state.assets.reduce((acc, curr) => acc + (curr.cost / (curr.lifeYears * 12)), 0); }
        function calculateTotalMonthlyOverhead() { return state.opsCosts.reduce((acc, curr) => acc + curr.monthly, 0); }
        function calculateVariantMetrics(variant) {
            let ingredientCostOnly = 0;
            variant.recipe.forEach(r => {
                const ing = state.ingredients.find(i => i.id === r.ingId);
                if (ing) ingredientCostOnly += (ing.cost / ing.bulkAmount) * r.qty;
            });
            const monthlyDepreciation = calculateMonthlyAssetDepreciation();
            const monthlyOverhead = calculateTotalMonthlyOverhead();
            const totalMonthlyFixedCosts = monthlyDepreciation + monthlyOverhead;
            const fixedCostPerUnit = totalMonthlyFixedCosts / state.targetQty;
            
            let maxCanProduce = Infinity;
            if (variant.recipe.length === 0) maxCanProduce = 0;
            variant.recipe.forEach(r => {
                const ing = state.ingredients.find(i => i.id === r.ingId);
                if (ing && r.qty > 0) {
                    const possible = Math.floor(ing.bulkAmount / r.qty);
                    if (possible < maxCanProduce) maxCanProduce = possible;
                }
            });
            return {
                ingredientCostOnly,
                totalHpp: ingredientCostOnly + fixedCostPerUnit,
                maxCanProduce: maxCanProduce === Infinity ? 0 : maxCanProduce
            };
        }
        function calculateBEPMetrics() {
            const fixedCosts = calculateTotalMonthlyOverhead() + calculateMonthlyAssetDepreciation();
            if (state.variants.length === 0) return { bepUnits: 0, fixedCosts };
            let totalMargin = 0;
            state.variants.forEach(v => {
                let ingCost = 0;
                v.recipe.forEach(r => {
                    const ing = state.ingredients.find(i => i.id === r.ingId);
                    if (ing) ingCost += (ing.cost / ing.bulkAmount) * r.qty;
                });
                totalMargin += (v.price - ingCost);
            });
            const avgMargin = totalMargin / state.variants.length;
            const bepUnits = avgMargin > 0 ? Math.ceil(fixedCosts / avgMargin) : Infinity;
            return { bepUnits, fixedCosts };
        }

                const gross = s.price * qty; // Nilai kotor sebelum dipotong persentase diskon reseller

                totals.qty += qty; totals.kotor += gross; totals.bersih += net; totals.modal += cost;
                if (pMethod === 'CASH') totals.cash += net;
                if (pMethod === 'QRIS') totals.qris += net;

        function renderLaporan(el) {
            const now = new Date();
            const reportData = state.sales.filter(sale => {
                const saleDate = new Date(sale.timestamp);
                if (state.reportFilter === 'daily') return saleDate.toDateString() === now.toDateString();
                if (state.reportFilter === 'weekly') return (now - saleDate) / (1000 * 60 * 60 * 24) <= 7;
                return saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();
            });

            const monthlyOverhead = calculateTotalMonthlyOverhead();
            const monthlyDepreciation = calculateMonthlyAssetDepreciation();
            let divisor = state.reportFilter === 'daily' ? 30 : state.reportFilter === 'weekly' ? 4.28 : 1;

            const allocOverhead = monthlyOverhead / divisor;
            const allocDepreciation = monthlyDepreciation / divisor;

            const revenue = reportData.reduce((a, b) => a + (b.price - (b.resellerProfit || 0)), 0);
            const ingCosts = reportData.reduce((a, b) => a + b.recordedIngredientCost, 0);
            const netProfit = revenue - ingCosts - allocOverhead - allocDepreciation;
            const totalUnits = reportData.length;

            const bepMetrics = calculateBEPMetrics();
            let bepTarget = state.reportFilter === 'daily' ? Math.ceil(bepMetrics.bepUnits / 30) : state.reportFilter === 'weekly' ? Math.ceil(bepMetrics.bepUnits / 4.28) : bepMetrics.bepUnits;
            const isBep = totalUnits >= bepTarget;

            el.innerHTML = `

                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">

                            <button onclick="state.reportFilter='weekly'; render();" class="px-4 py-1.5 rounded-lg text-xs font-bold ${state.reportFilter==='weekly'?'bg-white shadow-sm text-primary-600':'text-slate-500'}">Mingguan</button>
                            <button onclick="state.reportFilter='monthly'; render();" class="px-4 py-1.5 rounded-lg text-xs font-bold ${state.reportFilter==='monthly'?'bg-white shadow-sm text-primary-600':'text-slate-500'}">Bulanan</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div class="bg-white p-4 rounded-2xl border border-slate-200">
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Omzet Bersih</p><h4 class="text-sm font-black text-slate-800">${formatIDR(revenue)}</h4>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border border-slate-200">
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Beban Bahan</p><h4 class="text-sm font-black text-slate-500">${formatIDR(ingCosts)}</h4>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border border-slate-200">
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Overhead Pro-rata</p><h4 class="text-sm font-black text-red-400">${formatIDR(allocOverhead)}</h4>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border border-slate-200">
                            <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Penyusutan</p><h4 class="text-sm font-black text-primary-500">${formatIDR(allocDepreciation)}</h4>
                        </div>
                        <div class="col-span-2 md:col-span-1 p-4 rounded-2xl border ${netProfit >= 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}">

                            <h4 class="text-lg font-black ${netProfit >= 0 ? 'text-emerald-700' : 'text-red-600'}">${netProfit < 0 ? '-' : ''}${formatIDR(Math.abs(netProfit))}</h4>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-end mb-3">
                            <div>
                                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider mb-1">Progress BEP Periode Ini</p>
                                <h4 class="text-lg font-black text-slate-800">${totalUnits} <span class="text-sm text-slate-400">/ ${bepTarget} Btl</span></h4>
                            </div>
                            <span class="text-[10px] font-bold px-2.5 py-1 rounded-md ${isBep ? 'bg-emerald-100 text-emerald-700' : 'bg-primary-100 text-primary-700'}">${isBep ? 'Tercapai' : 'Belum BEP'}</span>

                        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-700 ${isBep ? 'bg-emerald-500' : 'bg-blue-500'}" style="width: ${Math.min((totalUnits / (bepTarget || 1)) * 100, 100)}%"></div>
                        </div>
                    </div>
                </div>
            `;
        }

                                    <div class="flex justify-between items-start mb-3">
                                        <div class="grid grid-cols-2 gap-2 w-full pr-4">
                                            <input class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs font-bold outline-none" value="${currentVariant.name}" onchange="updateVar(${currentVariant.id}, 'name', this.value)">
                                            <input type="number" class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs font-bold text-primary-600 outline-none" value="${currentVariant.price}" placeholder="Harga" onchange="updateVar(${currentVariant.id}, 'price', parseInt(this.value))">
                                            <select class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs font-bold outline-none col-span-2" onchange="updateVar(${currentVariant.id}, 'bottleSize', this.value)">
                                                <option value="250 ml" ${currentVariant.bottleSize==='250 ml'?'selected':''}>Botol 250 ml</option>
                                                <option value="500 ml" ${currentVariant.bottleSize==='500 ml'?'selected':''}>Botol 500 ml</option>
                                                <option value="1 Liter" ${currentVariant.bottleSize==='1 Liter'?'selected':''}>Botol 1 Liter</option>
                                            </select>
                                        </div>
                                        <button onclick="if(confirm('Hapus Varian Ini?')){ delVariant(${currentVariant.id}); }" class="text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Komposisi (Takaran)</p>
                                    <div class="space-y-1.5 max-h-[250px] overflow-y-auto pr-2 thin-scrollbar">
                                        ${state.ingredients.map(ing => {
                                            const rec = currentVariant.recipe.find(r => r.ingId === ing.id);
                                            return `
                                                <div class="flex justify-between items-center text-xs">
                                                    <span class="text-slate-600 line-clamp-1 pr-2">${ing.name}</span>
                                                    <div class="flex bg-white border border-slate-200 rounded overflow-hidden shrink-0">
                                                        <input type="number" class="w-12 text-center text-[10px] font-bold outline-none py-0.5" value="${rec?rec.qty:''}" placeholder="0" onchange="updateRecipe(${currentVariant.id}, ${ing.id}, this.value)">
                                                        <span class="bg-slate-100 text-[8px] font-bold text-slate-400 px-1 py-0.5 border-l">${ing.unit}</span>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            ` : `<div class="flex-1 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-400 text-xs font-medium min-h-[150px]">Pilih varian di atas</div>`}
                        </div>
                    </div>

                    <!-- DANGER ZONE -->
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-xs text-red-800">Zona Bahaya</h4>
                            <p class="text-[9px] text-red-500 mt-0.5">Hapus data (Penjualan / Semua Data)</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="promptReset('sales')" class="px-3 py-1.5 bg-white border border-red-200 rounded-lg text-[10px] font-bold text-red-600 hover:bg-red-100 transition-colors">Reset Penjualan</button>
                            <button onclick="promptReset('all')" class="px-3 py-1.5 bg-red-600 rounded-lg text-[10px] font-bold text-white hover:bg-red-700 transition-colors">Reset Total</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- SISTEM RESET & CRUD ---
        window.promptReset = (type) => {
            let targetName = type === 'sales' ? "Riwayat Penjualan" : "Seluruh Data Aplikasi";
            showModal('confirm', 'Hapus ' + targetName + '?', 'Tindakan ini permanen. Lanjutkan?', () => executeReset(type));
        };

        window.executeReset = async (type) => {
            showModal('alert', 'Memproses...', 'Menghubungi server...');
            try {
                if (type === 'sales' || type === 'all') {
                    const { error } = await supabaseClient.from('sales').delete().gt('id', 0);
                    if (error) throw error;
                    state.sales = [];
                }
                if (type === 'all') {
                    await supabaseClient.from('assets').delete().gt('id', 0);
                    await supabaseClient.from('ops_costs').delete().gt('id', 0);
                    await supabaseClient.from('ingredients').delete().gt('id', 0);
                    await supabaseClient.from('variants').delete().gt('id', 0);
                    await supabaseClient.from('resellers').delete().gt('id', 0);
                    state.assets = []; state.opsCosts = []; state.ingredients = []; state.variants = []; state.resellers = []; state.editingVariantId = null;
                }
                render();
                setTimeout(() => { closeModal(); }, 500);
            } catch (error) { showModal('alert', 'Gagal', 'Akses ditolak server.'); }
        };

        window.addReseller = () => { const newItem = { id: Date.now(), name: 'Toko Baru', phone: '', discountRate: 10 }; supabaseClient.from('resellers').insert([newItem]).then(); state.resellers.push(newItem); render(); };
        window.updateReseller = (id, f, v) => { supabaseClient.from('resellers').update({ [f]: v }).eq('id', id).then(); const r = state.resellers.find(x => x.id === id); if (r) r[f] = v; render(); };
        window.delReseller = (id) => { supabaseClient.from('resellers').delete().eq('id', id).then(); state.resellers = state.resellers.filter(x => x.id !== id); render(); };

        window.addIngredient = () => { const newItem = { id: Date.now(), name: 'Bahan Baru', cost: 0, bulkAmount: 100, unit: 'g' }; supabaseClient.from('ingredients').insert([newItem]).then(); state.ingredients.push(newItem); render(); };
        window.updateIng = (id, f, v) => { supabaseClient.from('ingredients').update({ [f]: v }).eq('id', id).then(); const i = state.ingredients.find(x => x.id === id); if (i) i[f] = v; render(); };
        window.delIng = (id) => { supabaseClient.from('ingredients').delete().eq('id', id).then(); state.ingredients = state.ingredients.filter(x => x.id !== id); render(); };
        
        window.addAsset = () => { const newItem = { id: Date.now(), name: 'Aset Baru', cost: 0, lifeYears: 5 }; supabaseClient.from('assets').insert([newItem]).then(); state.assets.push(newItem); render(); };
        window.updateAsset = (id, f, v) => { supabaseClient.from('assets').update({ [f]: v }).eq('id', id).then(); const a = state.assets.find(x => x.id === id); if (a) a[f] = v; render(); };
        window.delAsset = (id) => { supabaseClient.from('assets').delete().eq('id', id).then(); state.assets = state.assets.filter(x => x.id !== id); render(); };

        window.addVariant = () => { const nid = Date.now(); const dbItem = { id: nid, name: 'Varian Baru', price: 0, recipe: [{ ingId: 'SIZE', qty: '250 ml' }] }; supabaseClient.from('variants').insert([dbItem]).then(); state.variants.push({ id: nid, name: 'Varian Baru', bottleSize: '250 ml', price: 0, recipe: [] }); state.editingVariantId = nid; render(); };
        window.delVariant = (id) => { supabaseClient.from('variants').delete().eq('id', id).then(); state.variants = state.variants.filter(x => x.id !== id); state.editingVariantId = null; render(); };
        window.updateVar = (id, f, v) => { const x = state.variants.find(y => y.id === id); if (x) { x[f] = v; if (f === 'bottleSize') { const dbRecipe = [...x.recipe, { ingId: 'SIZE', qty: v }]; supabaseClient.from('variants').update({ recipe: dbRecipe }).eq('id', id).then(); } else { supabaseClient.from('variants').update({ [f]: v }).eq('id', id).then(); } } render(); };
        window.updateRecipe = (vid, iid, qty) => { const v = state.variants.find(x => x.id === vid); if (v) { const other = v.recipe.filter(r => r.ingId !== iid); const q = parseFloat(qty); const newRecipe = q > 0 ? [...other, { ingId: iid, qty: q }] : other; v.recipe = newRecipe; const dbRecipe = [...newRecipe, { ingId: 'SIZE', qty: v.bottleSize || '250 ml' }]; supabaseClient.from('variants').update({ recipe: dbRecipe }).eq('id', vid).then(); } render(); };
        
        window.updateTargetQty = (val) => { const newQty = parseInt(val) || 1; supabaseClient.from('settings').update({ targetQty: newQty }).eq('id', 1).then(); state.targetQty = newQty; render(); };
        window.addOps = () => { const newItem = { id: Date.now(), name: 'Biaya', monthly: 0 }; supabaseClient.from('ops_costs').insert([newItem]).then(); state.opsCosts.push(newItem); render(); };
        window.updateOpsCost = (id, f, v) => { supabaseClient.from('ops_costs').update({ [f]: v }).eq('id', id).then(); const o = state.opsCosts.find(x => x.id === id); if (o) o[f] = v; render(); };
        window.delOps = (id) => { supabaseClient.from('ops_costs').delete().eq('id', id).then(); state.opsCosts = state.opsCosts.filter(x => x.id !== id); render(); };

        // --- AUTH LOGIC ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const em = document.getElementById('email').value;
            const pw = document.getElementById('password').value;
            if (em === 'ruang.mozzart@gmail.com' && pw === 'R4h45i4ku') {
                const btn = e.target.querySelector('button');
                const origHtml = btn.innerHTML;
                btn.innerHTML = 'Memuat...';
                await loadDataFromSupabase();
                state.isLoggedIn = true;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                render();
                btn.innerHTML = origHtml;
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        // Initialize App UI settings on load
        initThemeAndLogo();
    </script>
</body>
</html>
